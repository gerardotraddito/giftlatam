<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis compras - GiftLatam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--negro:#080808;--card:#161616;--borde:#222;--blanco:#F0F0F0;--gris:#888;--verde:#00C853;--naranja:#FF6B35}
    body{font-family:'Inter',sans-serif;background:var(--negro);color:var(--blanco);padding-bottom:90px;min-height:100vh}
    nav{display:flex;align-items:center;padding:0 14px;height:52px;border-bottom:1px solid var(--borde);position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.97);backdrop-filter:blur(16px);gap:12px}
    .back-btn{display:flex;align-items:center;gap:6px;color:var(--gris);font-size:13px;cursor:pointer;text-decoration:none}
    .back-btn:hover{color:var(--blanco)}
    .nav-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;flex:1;text-align:center}
    .container{padding:16px 14px;max-width:600px;margin:0 auto}
    .stats-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
    .stat-mini{background:var(--card);border:1px solid var(--borde);border-radius:12px;padding:12px;text-align:center}
    .stat-mini-num{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:'tnum';font-size:20px;font-weight:800;color:var(--verde);display:block;line-height:1}
    .stat-mini-label{font-size:10px;color:var(--gris);display:block;margin-top:4px}
    .tx-card{background:var(--card);border:1px solid var(--borde);border-radius:14px;padding:14px 16px;margin-bottom:10px}
    .tx-top{display:flex;align-items:center;gap:12px}
    .tx-icon{width:42px;height:42px;border-radius:10px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .tx-info{flex:1;min-width:0}
    .tx-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-meta{font-size:11px;color:var(--gris);margin-top:2px}
    .tx-amount{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:'tnum';font-size:15px;font-weight:800;color:var(--verde);flex-shrink:0}
    .tx-status{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;margin-top:8px}
    .st-completado{background:rgba(0,200,83,0.1);color:var(--verde);border:1px solid rgba(0,200,83,0.2)}
    .st-pendiente{background:rgba(255,107,53,0.1);color:var(--naranja);border:1px solid rgba(255,107,53,0.2)}
    .st-cancelado{background:rgba(136,136,136,0.1);color:var(--gris);border:1px solid #333}
    .st-en_escrow{background:rgba(59,130,246,0.1);color:#60a5fa;border:1px solid rgba(59,130,246,0.2)}
    .empty{text-align:center;padding:50px 20px;color:var(--gris)}
    .empty-emoji{font-size:44px;display:block;margin-bottom:14px}
    .empty-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--blanco);margin-bottom:8px}
    .empty-sub{font-size:13px;line-height:1.6;margin-bottom:20px}
    .btn-action{display:inline-block;background:var(--verde);color:#000;border:none;border-radius:12px;padding:11px 22px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;cursor:pointer;text-decoration:none}
    .spinner{width:28px;height:28px;border:3px solid #222;border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;margin:30px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</head>
<body>
<nav>
  <a href="panel.html" class="back-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Mi panel
  </a>
  <div class="nav-title">Mis compras</div>
  <div style="width:60px"></div>
</nav>
<div class="container">
  <div class="stats-mini">
    <div class="stat-mini"><span class="stat-mini-num" id="cntTotal">-</span><span class="stat-mini-label">Total</span></div>
    <div class="stat-mini"><span class="stat-mini-num" id="cntMonto">-</span><span class="stat-mini-label">USDT</span></div>
    <div class="stat-mini"><span class="stat-mini-num" id="cntComp">-</span><span class="stat-mini-label">Completadas</span></div>
  </div>
  <div id="txList"><div class="spinner"></div></div>
</div>
<script>
var ROLE_FIELD = 'buyer_id';
var EMPTY_TITLE = 'Todavía no compraste nada';
var EMPTY_SUB   = 'Explorá el catálogo y encontrá gift cards con descuento.';
var EMPTY_CTA   = 'Explorar catálogo';
var EMPTY_HREF  = 'explorar.html';

document.addEventListener('DOMContentLoaded', async function() {
  var res = await sb.auth.getSession();
  if (!res.data || !res.data.session) { window.location.href='login.html'; return; }
  var uid = res.data.session.user.id;
  loadTx(uid);
});

var BRAND_ICONS = {
  steam:'🎮',xbox:'🎮',playstation:'🎮',psn:'🎮',nintendo:'🎮',roblox:'🎮',
  netflix:'🎬',spotify:'🎵',amazon:'🛒',youtube:'📺',discord:'💬',apple:'🍎'
};
function getIcon(m){ return BRAND_ICONS[(m||'').toLowerCase()] || '🎁'; }

async function loadTx(uid) {
  var q = sb.from('transactions').select('*, gift_cards(titulo, marca, precio_venta)').eq(ROLE_FIELD, uid).order('created_at', {ascending:false});
  var res = await q;
  var list = document.getElementById('txList');
  if (res.error) { list.innerHTML='<div class="empty"><span class="empty-emoji">⚠️</span><div>'+res.error.message+'</div></div>'; return; }
  var data = res.data || [];

  var total  = data.length;
  var monto  = data.reduce(function(s,t){return s+parseFloat(t.monto||0);},0).toFixed(0);
  var comp   = data.filter(function(t){return t.estado==='completado';}).length;
  document.getElementById('cntTotal').textContent = total;
  document.getElementById('cntMonto').textContent = monto;
  document.getElementById('cntComp').textContent  = comp;

  if (total === 0) {
    list.innerHTML = '<div class="empty"><span class="empty-emoji">📭</span><div class="empty-title">'+EMPTY_TITLE+'</div><div class="empty-sub">'+EMPTY_SUB+'</div><a class="btn-action" href="'+EMPTY_HREF+'">'+EMPTY_CTA+'</a></div>';
    return;
  }

  var stLabel = {completado:'✓ Completado',pendiente:'⏳ Pendiente',cancelado:'✗ Cancelado',en_escrow:'🔒 En escrow'};
  var stCls   = {completado:'st-completado',pendiente:'st-pendiente',cancelado:'st-cancelado',en_escrow:'st-en_escrow'};

  list.innerHTML = data.map(function(t) {
    var gc    = t.gift_cards || {};
    var titulo = gc.titulo || 'Gift card';
    var marca  = gc.marca  || '';
    var monto  = parseFloat(t.monto||gc.precio_venta||0).toFixed(2);
    var fecha  = t.created_at ? new Date(t.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'}) : '';
    var st     = t.estado || 'pendiente';
    return '<div class="tx-card">'+
      '<div class="tx-top">'+
        '<div class="tx-icon">'+getIcon(marca)+'</div>'+
        '<div class="tx-info">'+
          '<div class="tx-title">'+titulo+'</div>'+
          '<div class="tx-meta">'+marca+' · '+fecha+'</div>'+
        '</div>'+
        '<div class="tx-amount">$'+monto+' USDT</div>'+
      '</div>'+
      '<span class="tx-status '+(stCls[st]||'st-pendiente')+'">'+(stLabel[st]||st)+'</span>'+
    '</div>';
  }).join('');
}
</script>
</body>
</html>
