<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis ventas - GiftLatam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--negro:#080808;--card:#161616;--borde:#222;--blanco:#F0F0F0;--gris:#888;--verde:#00C853;--naranja:#FF6B35;--amarillo:#f3ba2f}
    body{font-family:'Inter',sans-serif;background:var(--negro);color:var(--blanco);padding-bottom:90px;min-height:100vh}
    nav{display:flex;align-items:center;padding:0 14px;height:52px;border-bottom:1px solid var(--borde);position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.97);backdrop-filter:blur(16px);gap:12px}
    .back-btn{display:flex;align-items:center;gap:6px;color:var(--gris);font-size:13px;text-decoration:none}
    .back-btn:hover{color:var(--blanco)}
    .nav-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;flex:1;text-align:center}
    .container{padding:16px 14px;max-width:600px;margin:0 auto}
    .stats-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
    .stat-mini{background:var(--card);border:1px solid var(--borde);border-radius:12px;padding:12px;text-align:center}
    .stat-mini-num{font-variant-numeric:tabular-nums;font-size:20px;font-weight:800;color:var(--verde);display:block;line-height:1}
    .stat-mini-label{font-size:10px;color:var(--gris);display:block;margin-top:4px}
    .alerta{border-radius:10px;padding:10px 14px;font-size:12px;color:#aaa;margin-bottom:16px;line-height:1.6}
    .alerta-verde{background:rgba(0,200,83,0.08);border:1px solid rgba(0,200,83,0.25)}
    .alerta-amarillo{background:rgba(243,186,47,0.08);border:1px solid rgba(243,186,47,0.25)}
    .alerta strong{color:var(--verde)}
    .tx-card{background:var(--card);border:1px solid var(--borde);border-radius:14px;padding:14px 16px;margin-bottom:10px}
    .tx-top{display:flex;align-items:center;gap:12px}
    .tx-icon{width:42px;height:42px;border-radius:10px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .tx-info{flex:1;min-width:0}
    .tx-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-meta{font-size:11px;color:var(--gris);margin-top:2px;font-family:'Courier New',monospace}
    .tx-amount{font-variant-numeric:tabular-nums;font-size:15px;font-weight:800;color:var(--verde);flex-shrink:0}
    .tx-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;flex-wrap:wrap;gap:8px}
    .tx-status{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
    .st-verificando{background:rgba(243,186,47,0.1);color:var(--amarillo);border:1px solid rgba(243,186,47,0.3)}
    .st-pagado{background:rgba(0,200,83,0.1);color:var(--verde);border:1px solid rgba(0,200,83,0.2)}
    .st-entregado{background:rgba(0,200,83,0.15);color:var(--verde);border:1px solid rgba(0,200,83,0.3)}
    .st-cancelado{background:rgba(136,136,136,0.1);color:var(--gris);border:1px solid #333}
    .comprador-label{font-size:11px;color:var(--gris)}
    .tx-botones{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
    .btn-accion{border:none;border-radius:9px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity 0.2s}
    .btn-accion:hover{opacity:0.85}
    .btn-accion:disabled{opacity:0.4;cursor:not-allowed}
    .btn-verde{background:var(--verde);color:#000}
    .btn-rojo{background:rgba(255,107,53,0.15);color:var(--naranja);border:1px solid rgba(255,107,53,0.3)}
    .empty{text-align:center;padding:50px 20px;color:var(--gris)}
    .empty-emoji{font-size:44px;display:block;margin-bottom:14px}
    .empty-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--blanco);margin-bottom:8px}
    .empty-sub{font-size:13px;line-height:1.6;margin-bottom:20px}
    .btn-action{display:inline-block;background:var(--verde);color:#000;border-radius:12px;padding:11px 22px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;text-decoration:none}
    .spinner{width:28px;height:28px;border:3px solid #222;border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;margin:50px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .codigo-wrap{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
    .codigo-input{flex:1;min-width:160px;background:#0d0d0d;border:1px solid var(--borde);border-radius:9px;padding:7px 12px;color:var(--blanco);font-family:'Courier New',monospace;font-size:13px;letter-spacing:1px}
    .codigo-input:focus{outline:none;border-color:var(--verde)}
    .codigo-entregado{font-family:'Courier New',monospace;font-size:13px;background:rgba(0,200,83,0.07);border:1px solid rgba(0,200,83,0.2);border-radius:9px;padding:7px 12px;color:var(--verde);word-break:break-all;margin-top:8px}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</head>
<body>

<nav>
  <a href="panel.html" class="back-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Mi panel
  </a>
  <div class="nav-title">💸 Mis ventas</div>
  <div style="width:60px"></div>
</nav>

<div class="container">
  <div class="stats-mini">
    <!-- Total: todas excepto canceladas -->
    <div class="stat-mini"><span class="stat-mini-num" id="cntTotal">—</span><span class="stat-mini-label">Órdenes activas</span></div>
    <!-- USDT: solo pagado + entregado -->
    <div class="stat-mini"><span class="stat-mini-num" id="cntMonto">—</span><span class="stat-mini-label">USDT cobrado</span></div>
    <!-- Pagadas: solo estado=pagado -->
    <div class="stat-mini"><span class="stat-mini-num" id="cntPagado">—</span><span class="stat-mini-label">Pagadas</span></div>
  </div>

  <div id="alerta" style="display:none"></div>
  <div id="txList"><div class="spinner"></div></div>
</div>

<script>
// ── Labels y clases por estado ───────────────────────────────────────────
var ST_LABEL = {
  verificando: '🔍 Comprador avisó que pagó',
  pagado:      '💰 Pago confirmado',
  entregado:   '✓ Entregado',
  cancelado:   '✗ Cancelada'
};
var ST_CLS = {
  verificando: 'st-verificando',
  pagado:      'st-pagado',
  entregado:   'st-entregado',
  cancelado:   'st-cancelado'
};
var ICONS = {
  steam:'🎮',xbox:'🎮',playstation:'🎮',psn:'🎮',nintendo:'🎮',roblox:'🎮',
  netflix:'🎬',spotify:'🎵',amazon:'🛒',youtube:'📺',discord:'💬',apple:'🍎'
};
function icon(m){ return ICONS[(m||'').toLowerCase().split(' ')[0]] || '🎁'; }

var SELLER_ID = '';

// ── Init ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  // Limpiar órdenes expiradas en background
  try { await sb.rpc('expirar_ordenes_vencidas'); } catch(e) {}

  var sess = await sb.auth.getSession();
  if (!sess.data || !sess.data.session) { window.location.href = 'login.html'; return; }
  SELLER_ID = sess.data.session.user.id;
  cargar();
});

// ── Carga de órdenes ─────────────────────────────────────────────────────
async function cargar() {
  var list = document.getElementById('txList');
  list.innerHTML = '<div class="spinner"></div>';

  // Solo traer verificando, pagado, entregado — NO pendiente_pago ni cancelado
  var res = await sb.from('ordenes')
    .select('id, numero_orden, gift_card_id, comprador_email, precio, red, estado, created_at, codigo_entregado')
    .eq('seller_id', SELLER_ID)
    .in('estado', ['verificando', 'pagado', 'entregado'])
    .order('created_at', { ascending: false });

  if (res.error) {
    list.innerHTML = '<div class="empty"><span class="empty-emoji">⚠️</span><div>Error al cargar: ' + res.error.message + '</div></div>';
    return;
  }

  var data = res.data || [];

  // Cargar títulos por separado (evita problemas de RLS en joins)
  var gcMap = {};
  var giftIds = data.map(function(o){ return o.gift_card_id; }).filter(Boolean);
  if (giftIds.length > 0) {
    try {
      var gcRes = await sb.from('gift_cards').select('id, titulo, marca, entrega, codigo').in('id', giftIds);
      if (gcRes.data) { gcRes.data.forEach(function(g){ gcMap[g.id] = g; }); }
    } catch(e) {}
  }

  // ── Calcular stats ───────────────────────────────────────────────────
  // Total activas: verificando + pagado + entregado (no cancelado)
  var cntTotal = data.length;

  // Solo pagado + entregado suman dinero real
  var cobradas  = data.filter(function(o){ return o.estado === 'pagado' || o.estado === 'entregado'; });
  var montoReal = cobradas.reduce(function(s,o){ return s + parseFloat(o.precio||0); }, 0);

  // Solo estado=pagado para el contador de "Pagadas"
  var soloPagado = data.filter(function(o){ return o.estado === 'pagado'; });

  document.getElementById('cntTotal').textContent  = cntTotal;
  document.getElementById('cntMonto').textContent  = '$' + montoReal.toFixed(0);
  document.getElementById('cntPagado').textContent = soloPagado.length;

  // ── Alerta contextual ────────────────────────────────────────────────
  var alertaEl       = document.getElementById('alerta');
  var hayVerificando = data.some(function(o){ return o.estado === 'verificando'; });
  var hayPagado      = data.some(function(o){ return o.estado === 'pagado'; });

  if (hayPagado) {
    alertaEl.className = 'alerta alerta-verde';
    alertaEl.innerHTML = '🔔 <strong>Tenés ventas pagadas.</strong> Enviá el código al comprador y marcá como entregado.';
    alertaEl.style.display = 'block';
  } else if (hayVerificando) {
    alertaEl.className = 'alerta alerta-amarillo';
    alertaEl.innerHTML = '🔍 <strong style="color:var(--amarillo)">Pagos en verificación.</strong> El admin debe aprobarlos antes de que puedas entregar.';
    alertaEl.style.display = 'block';
  } else {
    alertaEl.style.display = 'none';
  }

  // ── Empty state ──────────────────────────────────────────────────────
  if (data.length === 0) {
    list.innerHTML = '<div class="empty"><span class="empty-emoji">📭</span><div class="empty-title">No tenés ventas activas</div><div class="empty-sub">Las órdenes aparecen cuando un comprador avisa que pagó.</div><a class="btn-action" href="publicar.html">Publicar gift card</a></div>';
    return;
  }

  // ── Render de órdenes ────────────────────────────────────────────────
  list.innerHTML = data.map(function(o) {
    var gc       = gcMap[o.gift_card_id] || {};
    var titulo   = gc.titulo || 'Gift card';
    var marca    = gc.marca  || '';
    var monto    = parseFloat(o.precio || 0).toFixed(2);
    var fecha    = o.created_at ? new Date(o.created_at).toLocaleDateString('es', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'}) : '';
    var ref      = o.numero_orden ? '#' + String(o.numero_orden).padStart(6,'0') : '#' + (o.id||'').substring(0,8).toUpperCase();
    var st       = o.estado;
    var comprador = o.comprador_email ? o.comprador_email.replace(/(.{2}).*@/, '$1***@') : '—';

    // ── Botones según estado ─────────────────────────────────────────
    var tipoEntrega = gc.entrega || 'manual'; // 'auto' o 'manual'
    var botones = '';

    if (st === 'verificando') {
      // El admin aprueba — el vendedor no puede hacer nada todavía
      botones = '<div style="font-size:12px;color:var(--amarillo);padding:4px 0">🔍 En verificación — el admin debe aprobar este pago.</div>';

    } else if (st === 'pagado') {
      if (tipoEntrega === 'auto') {
        // Entrega automática: toma el código de gift_cards.codigo
        botones = '<button class="btn-accion btn-verde" onclick="entregarAuto(\'' + o.id + '\', \'' + o.gift_card_id + '\', this)">⚡ Entregar código automáticamente</button>';
      } else {
        // Entrega manual: el vendedor tipea el código
        botones = '<div class="codigo-wrap">' +
          '<input class="codigo-input" id="codigo-' + o.id + '" placeholder="Ingresá el código a entregar" />' +
          '<button class="btn-accion btn-verde" onclick="entregarManual(\'' + o.id + '\', this)">📦 Enviar código</button>' +
        '</div>';
      }

    } else if (st === 'entregado') {
      // Mostrar el código que se entregó
      var codigoMostrar = o.codigo_entregado || '—';
      botones = '<div style="margin-top:4px">' +
        '<div style="font-size:11px;color:var(--gris);margin-bottom:4px">Código entregado:</div>' +
        '<div class="codigo-entregado">' + codigoMostrar + '</div>' +
      '</div>';
    }

    return '<div class="tx-card">' +
      '<div class="tx-top">' +
        '<div class="tx-icon">' + icon(marca) + '</div>' +
        '<div class="tx-info">' +
          '<div class="tx-title">' + titulo + '</div>' +
          '<div class="tx-meta"><span style="color:var(--verde);font-weight:700;font-size:12px;letter-spacing:0.5px">' + ref + '</span> <span style="color:#555">·</span> ' + fecha + '</div>' +
        '</div>' +
        '<div class="tx-amount">$' + monto + '</div>' +
      '</div>' +
      '<div class="tx-footer">' +
        '<span class="tx-status ' + (ST_CLS[st] || '') + '">' + (ST_LABEL[st] || st) + '</span>' +
        '<span class="comprador-label">Comprador: ' + comprador + '</span>' +
      '</div>' +
      (botones ? '<div class="tx-botones">' + botones + '</div>' : '') +
    '</div>';
  }).join('');
}

// ── Helpers de entrega ───────────────────────────────────────────────────

// Verificar que la orden sigue en 'pagado' antes de entregar
async function verificarPagado(ordenId) {
  var check = await sb.from('ordenes').select('estado').eq('id', ordenId).single();
  if (!check.data || check.data.estado !== 'pagado') {
    var est = check.data ? check.data.estado : '?';
    alert(est === 'verificando'
      ? 'El pago no fue aprobado aún por el admin.'
      : 'Estado inválido (' + est + '). Recargá la página.');
    return false;
  }
  return true;
}

// Guardar código y marcar entregado (reutilizado por auto y manual)
async function guardarEntrega(ordenId, codigo, btn, btnText) {
  var upd = await sb.from('ordenes')
    .update({
      estado:           'entregado',
      codigo_entregado: codigo,
      updated_at:       new Date().toISOString()
    })
    .eq('id', ordenId)
    .eq('estado', 'pagado'); // protección: solo actualiza si sigue en pagado

  if (upd.error) {
    alert('Error al guardar: ' + upd.error.message);
    btn.disabled = false;
    btn.textContent = btnText;
    return false;
  }
  return true;
}

// ── Entrega MANUAL: el vendedor tipea el código ───────────────────────────
async function entregarManual(ordenId, btn) {
  var input = document.getElementById('codigo-' + ordenId);
  var codigo = input ? input.value.trim() : '';
  if (!codigo) { alert('Ingresá el código antes de enviar.'); input && input.focus(); return; }
  if (!confirm('¿Confirmás enviar este código?\n' + codigo)) return;

  btn.disabled = true;
  btn.textContent = 'Enviando...';

  if (!await verificarPagado(ordenId)) { btn.disabled = false; btn.textContent = 'Enviar código'; return; }
  if (!await guardarEntrega(ordenId, codigo, btn, 'Enviar código')) return;

  cargar();
}

// ── Entrega AUTOMÁTICA: toma el código de gift_cards.codigo ──────────────
async function entregarAuto(ordenId, giftCardId, btn) {
  if (!confirm('¿Entregar el código automáticamente al comprador?')) return;

  btn.disabled = true;
  btn.textContent = 'Entregando...';

  if (!await verificarPagado(ordenId)) { btn.disabled = false; btn.textContent = '⚡ Entregar código automáticamente'; return; }

  // Leer el código desde gift_cards
  var gcRes = await sb.from('gift_cards').select('codigo').eq('id', giftCardId).single();
  if (gcRes.error || !gcRes.data || !gcRes.data.codigo) {
    alert('No se encontró el código en el producto. Usá entrega manual.');
    btn.disabled = false;
    btn.textContent = '⚡ Entregar código automáticamente';
    return;
  }

  var codigo = gcRes.data.codigo;
  if (!await guardarEntrega(ordenId, codigo, btn, '⚡ Entregar código automáticamente')) return;

  cargar();
}
</script>
</body>
</html>
