<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuración - GiftLatam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--negro:#080808;--card:#161616;--borde:#222;--blanco:#F0F0F0;--gris:#888;--verde:#00C853;--naranja:#FF6B35;--rojo:#FF4444}
    body{font-family:'Inter',sans-serif;background:var(--negro);color:var(--blanco);padding-bottom:90px;min-height:100vh}
    nav{display:flex;align-items:center;padding:0 14px;height:52px;border-bottom:1px solid var(--borde);position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.97);backdrop-filter:blur(16px);gap:12px}
    .back-btn{display:flex;align-items:center;gap:6px;color:var(--gris);font-size:13px;cursor:pointer;text-decoration:none;flex-shrink:0}
    .back-btn:hover{color:var(--blanco)}
    .nav-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;flex:1;text-align:center}
    .container{padding:16px 14px;max-width:600px;margin:0 auto}

    /* Secciones */
    .section-label{font-size:11px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:0.08em;padding:0 4px;margin:24px 0 8px}
    .section-label:first-child{margin-top:0}
    .menu-group{background:var(--card);border:1px solid var(--borde);border-radius:16px;overflow:hidden;margin-bottom:4px}
    .menu-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--borde);cursor:pointer;transition:background 0.15s;text-decoration:none;color:inherit}
    .menu-row:last-child{border-bottom:none}
    .menu-row:hover{background:rgba(255,255,255,0.03)}
    .menu-row-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
    .menu-row-body{flex:1;min-width:0}
    .menu-row-title{font-size:14px;font-weight:500}
    .menu-row-sub{font-size:12px;color:var(--gris);margin-top:2px}
    .menu-row-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
    .arrow{color:var(--gris);font-size:16px}
    .value-tag{font-size:12px;color:var(--gris)}

    /* Toggle switch */
    .toggle{position:relative;width:44px;height:24px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0;position:absolute}
    .toggle-slider{position:absolute;inset:0;background:#333;border-radius:24px;cursor:pointer;transition:background 0.2s}
    .toggle-slider::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform 0.2s}
    .toggle input:checked + .toggle-slider{background:var(--verde)}
    .toggle input:checked + .toggle-slider::after{transform:translateX(20px)}

    /* Avatar */
    .avatar-section{background:var(--card);border:1px solid var(--borde);border-radius:16px;padding:20px 16px;margin-bottom:4px;display:flex;align-items:center;gap:16px}
    .avatar-circle{width:64px;height:64px;border-radius:50%;background:rgba(0,200,83,0.15);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:var(--verde);flex-shrink:0;position:relative;cursor:pointer}
    .avatar-edit{position:absolute;bottom:0;right:0;background:var(--verde);color:#000;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}
    .avatar-info{flex:1}
    .avatar-name{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;margin-bottom:3px}
    .avatar-email{font-size:12px;color:var(--gris)}
    .avatar-change{font-size:12px;color:var(--verde);cursor:pointer;margin-top:6px;display:inline-block}

    /* Input field */
    .input-row{background:var(--card);border:1px solid var(--borde);border-radius:16px;overflow:hidden;margin-bottom:4px}
    .input-field{width:100%;background:transparent;border:none;outline:none;color:var(--blanco);font-family:'Inter',sans-serif;font-size:14px;padding:14px 16px}
    .input-label-row{display:flex;align-items:center;padding:10px 16px 0;gap:8px}
    .input-label{font-size:11px;color:var(--gris);font-weight:600}

    /* Danger zone */
    .danger-btn{width:100%;background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.2);color:var(--rojo);border-radius:16px;padding:14px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;text-align:left;display:flex;align-items:center;gap:10px;transition:background 0.15s}
    .danger-btn:hover{background:rgba(255,68,68,0.15)}

    /* Save bar */
    .save-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(8,8,8,0.97);border-top:1px solid var(--borde);padding:12px 14px;z-index:200;display:none;backdrop-filter:blur(16px)}
    .save-bar.visible{display:block}
    .btn-save{width:100%;background:var(--verde);color:#000;border:none;border-radius:14px;padding:14px;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;cursor:pointer}

    /* Toast */
    .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:#1a1a1a;border:1px solid var(--verde);color:var(--verde);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-box{background:#161616;border:1px solid #333;border-radius:20px;padding:26px;max-width:320px;width:100%}
    .modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:8px}
    .modal-sub{font-size:13px;color:#888;line-height:1.6;margin-bottom:22px}
    .modal-btns{display:flex;gap:10px}
    .modal-cancel{flex:1;padding:11px;border-radius:12px;background:#222;color:var(--blanco);border:none;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
    .modal-confirm{flex:1;padding:11px;border-radius:12px;background:var(--rojo);color:#fff;border:none;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}

    .spinner{width:24px;height:24px;border:3px solid #222;border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;margin:30px auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</head>
<body>

<div class="toast" id="toast"></div>

<nav>
  <a href="panel.html" class="back-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Mi panel
  </a>
  <div class="nav-title">Configuración</div>
  <div style="width:60px"></div>
</nav>

<div class="container" id="mainContent">
  <div class="spinner"></div>
</div>

<!-- Save bar -->
<div class="save-bar" id="saveBar">
  <button class="btn-save" onclick="guardarPerfil()">Guardar cambios</button>
</div>

<script>
var currentUser = null;
var hasChanges = false;

document.addEventListener('DOMContentLoaded', async function() {
  var res = await sb.auth.getSession();
  if (!res.data || !res.data.session) {
    window.location.href = 'login.html';
    return;
  }
  currentUser = res.data.session.user;



  renderConfig();
});

function renderConfig() {
  var meta = currentUser.user_metadata || {};
  var nombre  = meta.nombre  || '';
  var usuario = meta.usuario || currentUser.email.split('@')[0];
  var bio     = meta.bio     || '';
  var email   = currentUser.email || '';
  var avatarLetter = (nombre || usuario).charAt(0).toUpperCase();

  document.getElementById('mainContent').innerHTML =

    // ── Perfil ──
    '<div class="section-label">Perfil público</div>' +
    '<div class="avatar-section">' +
      '<div class="avatar-circle" id="avatarCircle">' + avatarLetter +
        '<div class="avatar-edit">✏</div>' +
      '</div>' +
      '<div class="avatar-info">' +
        '<div class="avatar-name" id="avatarName">@' + usuario + '</div>' +
        '<div class="avatar-email">' + email + '</div>' +
      '</div>' +
    '</div>' +

    '<div class="input-row">' +
      '<div class="input-label-row"><span class="input-label">NOMBRE COMPLETO</span></div>' +
      '<input class="input-field" id="inputNombre" value="' + esc(nombre) + '" placeholder="Tu nombre" oninput="markChanged(); updateAvatarPreview()">' +
    '</div>' +

    '<div class="input-row">' +
      '<div class="input-label-row"><span class="input-label">NOMBRE DE USUARIO</span></div>' +
      '<input class="input-field" id="inputUsuario" value="' + esc(usuario) + '" placeholder="tu_usuario" oninput="markChanged(); updateAvatarPreview()">' +
    '</div>' +

    '<div class="input-row">' +
      '<div class="input-label-row"><span class="input-label">BIO (visible en tus publicaciones)</span></div>' +
      '<input class="input-field" id="inputBio" value="' + esc(bio) + '" placeholder="Vendedor confiable desde 2022..." oninput="markChanged()">' +
    '</div>' +

    // ── Notificaciones ──
    '<div class="section-label">Notificaciones</div>' +
    '<div class="menu-group">' +
      menuToggle('🔔', 'Nueva venta', 'Cuando alguien compra tu gift card', 'notifVenta', true) +
      menuToggle('💬', 'Mensajes', 'Cuando recibís un mensaje de un comprador', 'notifMensaje', true) +
      menuToggle('💰', 'Depósito confirmado', 'Cuando acreditamos fondos en tu wallet', 'notifDeposito', true) +
      menuToggle('⚖️', 'Disputa abierta', 'Si se abre una disputa en tu operación', 'notifDisputa', true) +
    '</div>' +

    // ── Seguridad ──
    '<div class="section-label">Seguridad</div>' +
    '<div class="menu-group">' +
      '<a href="reset-password-request.html" class="menu-row">' +
        '<span class="menu-row-icon">🔑</span>' +
        '<div class="menu-row-body"><div class="menu-row-title">Cambiar contraseña</div><div class="menu-row-sub">Te enviamos un link a tu email</div></div>' +
        '<div class="menu-row-right"><span class="arrow">›</span></div>' +
      '</a>' +
      menuToggle('🛡️', 'Autenticación 2FA', 'Capa extra de seguridad (próximamente)', 'toggle2fa', false, true) +
    '</div>' +

    // ── Privacidad ──
    '<div class="section-label">Privacidad</div>' +
    '<div class="menu-group">' +
      menuToggle('👁️', 'Perfil público', 'Tu perfil visible para otros usuarios', 'perfilPublico', true) +
      menuToggle('📊', 'Mostrar estadísticas', 'Ventas y reputación visibles en tus listings', 'mostrarStats', true) +
    '</div>' +



    // ── Soporte ──
    '<div class="section-label">Soporte</div>' +
    '<div class="menu-group">' +
      '<a href="como-funciona.html" class="menu-row"><span class="menu-row-icon">📖</span><div class="menu-row-body"><div class="menu-row-title">¿Cómo funciona?</div></div><div class="menu-row-right"><span class="arrow">›</span></div></a>' +
      '<a href="ayuda.html" class="menu-row"><span class="menu-row-icon">💬</span><div class="menu-row-body"><div class="menu-row-title">Centro de ayuda</div></div><div class="menu-row-right"><span class="arrow">›</span></div></a>' +
      '<a href="terminos.html" class="menu-row"><span class="menu-row-icon">📄</span><div class="menu-row-body"><div class="menu-row-title">Términos y condiciones</div></div><div class="menu-row-right"><span class="arrow">›</span></div></a>' +
      '<a href="privacidad.html" class="menu-row"><span class="menu-row-icon">🔒</span><div class="menu-row-body"><div class="menu-row-title">Política de privacidad</div></div><div class="menu-row-right"><span class="arrow">›</span></div></a>' +
    '</div>' +

    // ── Zona peligrosa ──
    '<div class="section-label">Zona peligrosa</div>' +
    '<button class="danger-btn" onclick="confirmarEliminarCuenta()"><span>🗑️</span> Eliminar mi cuenta</button>' +
    '<div style="height:80px"></div>';
}

function menuToggle(icon, title, sub, id, checked, disabled) {
  return '<div class="menu-row">' +
    '<span class="menu-row-icon">' + icon + '</span>' +
    '<div class="menu-row-body"><div class="menu-row-title">' + title + '</div><div class="menu-row-sub">' + sub + '</div></div>' +
    '<div class="menu-row-right">' +
      '<label class="toggle">' +
        '<input type="checkbox" id="' + id + '"' + (checked ? ' checked' : '') + (disabled ? ' disabled' : '') + ' onchange="markChanged()">' +
        '<span class="toggle-slider"></span>' +
      '</label>' +
    '</div>' +
  '</div>';
}

function esc(str) {
  return (str || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}


function markChanged() {
  hasChanges = true;
  document.getElementById('saveBar').classList.add('visible');
}

function updateAvatarPreview() {
  var n = document.getElementById('inputNombre').value || document.getElementById('inputUsuario').value || '?';
  document.getElementById('avatarCircle').childNodes[0].textContent = n.charAt(0).toUpperCase();
  document.getElementById('avatarName').textContent = '@' + (document.getElementById('inputUsuario').value || '');
}

async function guardarPerfil() {
  var btn = document.querySelector('.btn-save');
  btn.textContent = 'Guardando...';
  btn.disabled = true;

  var nombre  = document.getElementById('inputNombre').value.trim();
  var usuario = document.getElementById('inputUsuario').value.trim();
  var bio     = document.getElementById('inputBio').value.trim();
  var wallet = null;

  // Guardar nombre/usuario/bio en auth metadata
  var res = await sb.auth.updateUser({
    data: { nombre: nombre, usuario: usuario, bio: bio }
  });

  if (res.error) {
    showToast('❌ Error: ' + res.error.message);
    btn.textContent = 'Guardar cambios';
    btn.disabled = false;
    return;
  }



  showToast('✅ Cambios guardados');
  hasChanges = false;
  document.getElementById('saveBar').classList.remove('visible');
  btn.textContent = 'Guardar cambios';
  btn.disabled = false;
}

function showComingSoon(feature) {
  showToast('🔜 ' + feature + ' — próximamente');
}

function confirmarEliminarCuenta() {
  var modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML =
    '<div class="modal-box">' +
      '<div class="modal-title">¿Eliminar tu cuenta?</div>' +
      '<div class="modal-sub">Esta acción es irreversible. Se eliminarán todos tus datos, publicaciones e historial de transacciones.</div>' +
      '<div class="modal-btns">' +
        '<button class="modal-cancel" onclick="this.closest(\'.modal-overlay\').remove()">Cancelar</button>' +
        '<button class="modal-confirm" onclick="eliminarCuenta(this)">Sí, eliminar</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(modal);
}

async function eliminarCuenta(btn) {
  btn.textContent = '...';
  btn.disabled = true;
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}
</script>
</body>
</html>
