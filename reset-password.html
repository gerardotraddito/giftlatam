<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña - GiftLatam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="js/supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --negro: #080808; --gris-card: #161616; --gris-borde: #222; --blanco: #F0F0F0; --gris: #888; --verde: #00C853; --rojo: #FF4444; }
    body { font-family: 'Inter', sans-serif; background: var(--negro); color: var(--blanco); min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; padding: 0 16px; height: 52px; border-bottom: 1px solid var(--gris-borde); background: rgba(8,8,8,0.97); }
    .logo { display: flex; align-items: center; gap: 7px; text-decoration: none; }
    .logo-icon { width: 32px; height: 32px; background: var(--verde); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: #F0F0F0; }
    .logo-text span { color: var(--verde); }
    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
    .card { background: var(--gris-card); border: 1px solid var(--gris-borde); border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 400px; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 6px; }
    .card-sub { font-size: 13px; color: var(--gris); margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--gris); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .input-wrap { position: relative; }
    input { width: 100%; background: #111; border: 1px solid var(--gris-borde); border-radius: 10px; padding: 11px 14px; color: var(--blanco); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .input-wrap input { padding-right: 44px; }
    input:focus { border-color: var(--verde); }
    .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--gris); cursor: pointer; font-size: 18px; padding: 4px; }
    .strength-bar { height: 4px; border-radius: 2px; background: var(--gris-borde); margin-top: 6px; }
    .strength-fill { height: 100%; border-radius: 2px; transition: all 0.3s; width: 0; }
    .strength-text { font-size: 11px; margin-top: 3px; height: 14px; }
    .btn-submit { width: 100%; background: var(--verde); color: #000; border: none; border-radius: 12px; padding: 13px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 8px; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .alert { border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.5; }
    .alert.show { display: block; }
    .alert.success { background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.3); color: var(--verde); }
    .alert.danger { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: var(--rojo); }
    .loading-state { text-align: center; padding: 40px 20px; }
    .loading-state .emoji { font-size: 40px; margin-bottom: 12px; display: block; }
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">💎</div>
    <span class="logo-text">Gift<span>Latam</span></span>
  </a>
</nav>

<div class="page">
  <div class="card">

    <!-- Estado: verificando token -->
    <div id="stateVerifying" class="loading-state">
      <span class="emoji">🔒</span>
      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px">Verificando...</div>
      <div style="font-size:13px;color:#888">Validando tu link de recuperación</div>
    </div>

    <!-- Estado: token inválido/expirado -->
    <div id="stateInvalid" style="display:none" class="loading-state">
      <span class="emoji">❌</span>
      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px">Link inválido</div>
      <div style="font-size:13px;color:#888;margin-bottom:20px">El link expiró o ya fue usado. Pedí uno nuevo.</div>
      <a href="login.html" style="background:var(--verde);color:#000;border:none;border-radius:12px;padding:12px 24px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;text-decoration:none;display:inline-block">Volver al login</a>
    </div>

    <!-- Estado: formulario nueva contraseña -->
    <div id="stateForm" style="display:none">
      <div class="card-title">🔑 Nueva contraseña</div>
      <div class="card-sub">Elegí una contraseña segura para tu cuenta</div>

      <div class="alert success" id="alertOk"></div>
      <div class="alert danger" id="alertErr"></div>

      <div class="form-group">
        <label>Nueva contraseña</label>
        <div class="input-wrap">
          <input type="password" id="pw1" placeholder="Mínimo 8 caracteres">
          <button type="button" class="eye-btn" id="eye1">👁️</button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-text" id="strengthText"></div>
      </div>

      <div class="form-group">
        <label>Confirmar contraseña</label>
        <div class="input-wrap">
          <input type="password" id="pw2" placeholder="Repetí tu contraseña">
          <button type="button" class="eye-btn" id="eye2">👁️</button>
        </div>
      </div>

      <button class="btn-submit" id="btnSave" onclick="savePassword()">Guardar contraseña</button>
    </div>

    <!-- Estado: éxito -->
    <div id="stateSuccess" style="display:none" class="loading-state">
      <span class="emoji">✅</span>
      <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px">¡Contraseña actualizada!</div>
      <div style="font-size:13px;color:#888;margin-bottom:20px">Ya podés iniciar sesión con tu nueva contraseña.</div>
      <a href="login.html" style="background:var(--verde);color:#000;border:none;border-radius:12px;padding:12px 24px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;text-decoration:none;display:inline-block">Ir al login →</a>
    </div>

  </div>
</div>

<script>
function setState(name) {
  ['stateVerifying','stateInvalid','stateForm','stateSuccess'].forEach(id => {
    document.getElementById(id).style.display = id === name ? 'block' : 'none';
  });
}

// ── Detectar sesión de recovery automáticamente ──
// Supabase detecta el token en la URL y dispara PASSWORD_RECOVERY
sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    setState('stateForm');
  } else if (event === 'SIGNED_IN' && session) {
    // Token válido pero no recovery — igual mostrar form si estamos en reset
    setState('stateForm');
  }
});

// Verificar sesión existente (por si el token ya fue procesado)
window.addEventListener('DOMContentLoaded', async () => {
  // Dar tiempo al SDK para procesar el token de la URL
  setTimeout(async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      setState('stateForm');
    } else {
      // Verificar si hay token en la URL (hash fragment)
      const hash = window.location.hash;
      if (hash && (hash.includes('access_token') || hash.includes('type=recovery'))) {
        setState('stateForm'); // SDK lo procesa automáticamente
      } else {
        setState('stateInvalid');
      }
    }
  }, 800);
});

// ── Ojos contraseña ──
document.getElementById('eye1').addEventListener('click', function() {
  const inp = document.getElementById('pw1');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '👁️' : '🙈';
});
document.getElementById('eye2').addEventListener('click', function() {
  const inp = document.getElementById('pw2');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  this.textContent = inp.type === 'password' ? '👁️' : '🙈';
});

// ── Fuerza contraseña ──
document.getElementById('pw1').addEventListener('input', function() {
  const v = this.value;
  let score = 0;
  if (v.length >= 8) score++;
  if (/[A-Z]/.test(v)) score++;
  if (/[0-9]/.test(v)) score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;
  const lvl = [
    { w:'0%', c:'', t:'' },
    { w:'25%', c:'#FF4444', t:'Muy débil' },
    { w:'50%', c:'#FF9800', t:'Débil' },
    { w:'75%', c:'#FFC107', t:'Buena' },
    { w:'100%', c:'#00C853', t:'🔒 Muy segura' }
  ][score];
  const f = document.getElementById('strengthFill');
  f.style.width = lvl.w; f.style.background = lvl.c;
  const t = document.getElementById('strengthText');
  t.textContent = lvl.t; t.style.color = lvl.c;
});

// ── Guardar nueva contraseña ──
async function savePassword() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const alertErr = document.getElementById('alertErr');
  const alertOk = document.getElementById('alertOk');

  alertErr.classList.remove('show');
  alertOk.classList.remove('show');

  if (pw1.length < 8) {
    alertErr.textContent = '❌ La contraseña debe tener al menos 8 caracteres';
    alertErr.classList.add('show');
    return;
  }
  if (pw1 !== pw2) {
    alertErr.textContent = '❌ Las contraseñas no coinciden';
    alertErr.classList.add('show');
    return;
  }

  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = 'Guardando...';

  const { error } = await sb.auth.updateUser({ password: pw1 });

  if (error) {
    alertErr.textContent = '❌ ' + error.message;
    alertErr.classList.add('show');
    btn.disabled = false; btn.textContent = 'Guardar contraseña';
    return;
  }

  // Éxito
  await sb.auth.signOut();
  setState('stateSuccess');
}
</script>
</body>
</html>
