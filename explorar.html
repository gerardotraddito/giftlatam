<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explorar Gift Cards - GiftLatam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --negro: #080808; --gris-oscuro: #111; --gris-card: #161616;
      --gris-borde: #222; --blanco: #F0F0F0; --gris: #888;
      --verde: #00C853; --naranja: #FF6B35;
    }
    html, body { max-width: 100%; overflow-x: hidden; }
    body { font-family: 'Inter', sans-serif; background: var(--negro); color: var(--blanco); padding-bottom: 90px; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 14px; height: 52px; border-bottom: 1px solid var(--gris-borde); position: sticky; top: 0; z-index: 1000; background: rgba(8,8,8,0.97); backdrop-filter: blur(20px); gap: 8px; }
    .logo { display: flex; align-items: center; gap: 7px; text-decoration: none; flex-shrink: 0; }
    .logo-icon { width: 32px; height: 32px; background: var(--verde); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: #F0F0F0; }
    .logo-text span { color: var(--verde); }
    .nav-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .btn-login { background: transparent; color: var(--blanco); border: 1px solid var(--gris-borde); border-radius: 9px; padding: 7px 12px; font-size: 12px; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .btn-vender { background: var(--verde); color: #000; border: none; border-radius: 9px; padding: 7px 12px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; }
    .search-wrap { background: var(--gris-oscuro); padding: 10px 14px; border-bottom: 1px solid var(--gris-borde); position: sticky; top: 52px; z-index: 999; }
    .search-inner { display: flex; align-items: center; gap: 10px; background: #1a1a1a; border: 1px solid var(--gris-borde); border-radius: 12px; padding: 10px 14px; transition: border-color 0.2s; }
    .search-inner:focus-within { border-color: var(--verde); }
    .search-inner svg { color: var(--gris); flex-shrink: 0; }
    .search-inner input { background: none; border: none; outline: none; color: var(--blanco); font-size: 15px; width: 100%; font-family: inherit; }
    .search-inner input::placeholder { color: var(--gris); }
    .clear-btn { background: none; border: none; color: var(--gris); font-size: 18px; cursor: pointer; padding: 0; display: none; flex-shrink: 0; }
    .cat-bar { display: flex; gap: 8px; padding: 10px 14px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--gris-borde); }
    .cat-bar::-webkit-scrollbar { display: none; }
    .cat-pill { border: 1px solid var(--gris-borde); color: var(--gris); border-radius: 20px; padding: 6px 14px; font-size: 12px; white-space: nowrap; cursor: pointer; background: transparent; font-family: inherit; flex-shrink: 0; transition: all 0.2s; }
    .cat-pill.active { border-color: var(--verde); color: var(--negro); background: var(--verde); font-weight: 700; }
    .filters-row { display: flex; gap: 8px; padding: 10px 14px; overflow-x: auto; scrollbar-width: none; align-items: center; border-bottom: 1px solid var(--gris-borde); background: var(--negro); }
    .filters-row::-webkit-scrollbar { display: none; }
    .filter-btn { border: 1px solid var(--gris-borde); color: var(--gris); border-radius: 8px; padding: 5px 12px; font-size: 12px; white-space: nowrap; cursor: pointer; background: transparent; font-family: inherit; flex-shrink: 0; transition: all 0.2s; }
    .filter-btn.active { border-color: var(--verde); color: var(--verde); background: rgba(0,200,83,0.1); font-weight: 600; }
    .results-count { font-size: 12px; color: var(--gris); white-space: nowrap; margin-left: auto; flex-shrink: 0; }
    .container { padding: 14px; max-width: 1280px; margin: 0 auto; }
    .vouchers-list { display: flex; flex-direction: column; gap: 10px; }
    .voucher-card { display: flex; flex-direction: row; align-items: stretch; background: var(--gris-card); border: 1px solid var(--gris-borde); border-radius: 14px; cursor: pointer; text-decoration: none; color: inherit; overflow: hidden; transition: box-shadow 0.15s, border-color 0.15s; min-height: 100px; }
    .voucher-card:hover { border-color: rgba(0,200,83,0.4); box-shadow: 0 2px 12px rgba(0,200,83,0.08); }
    .vc-img { width: 100px; min-width: 100px; flex-shrink: 0; background: #1a1a1a; position: relative; overflow: hidden; }
    .vc-img-logo { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    .vc-img-logo img { width: 54px; height: 54px; object-fit: contain; display: block; }
    .vc-img-emoji { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 38px; }
    .vc-body { flex: 1; min-width: 0; padding: 11px 12px; display: flex; flex-direction: column; justify-content: space-between; gap: 5px; }
    .vc-title { font-size: 14px; font-weight: 700; color: var(--blanco); line-height: 1.35; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .vc-seller { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .vc-seller-name { font-size: 12px; font-weight: 600; color: var(--blanco); }
    .vc-verified { width: 14px; height: 14px; background: var(--verde); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 8px; color: #000; font-weight: 700; flex-shrink: 0; }
    .vc-rep { display: inline-flex; align-items: center; gap: 3px; background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.2); border-radius: 5px; padding: 1px 5px; font-size: 10px; color: var(--verde); font-weight: 700; }
    .vc-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .vc-price-block { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
    .vc-price { font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 800; color: var(--verde); font-variant-numeric: tabular-nums; }
    .vc-price-old { font-family: 'Inter', sans-serif; font-size: 12px; color: var(--gris); text-decoration: line-through; }
    .vc-discount { background: #ff0; color: #000; font-size: 10px; font-weight: 800; border-radius: 4px; padding: 1px 5px; }
    .vc-meta-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
    .vc-stock-low { font-size: 11px; font-weight: 700; color: var(--naranja); }
    .vc-stock-ok  { font-size: 11px; color: var(--gris); }
    .vc-ventas    { font-size: 11px; color: var(--gris); }
    .loading { text-align: center; padding: 60px 20px; color: var(--gris); font-size: 14px; }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--gris-borde); border-top-color: var(--verde); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state-emoji { font-size: 48px; margin-bottom: 14px; display: block; }
    .empty-state-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty-state-sub { font-size: 13px; color: var(--gris); margin-bottom: 20px; line-height: 1.6; }
    .btn-action { background: var(--verde); color: #000; border: none; border-radius: 12px; padding: 11px 22px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; text-decoration: none; display: inline-block; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(14,14,14,0.97); border-top: 1px solid var(--gris-borde); display: flex; justify-content: space-around; align-items: center; padding: 8px 0 14px; z-index: 9999; backdrop-filter: blur(20px); }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--gris); font-size: 10px; padding: 2px 8px; }
    .nav-item.active { color: var(--verde); }
    .nav-item svg { width: 21px; height: 21px; }
    @media (min-width: 768px) { .vouchers-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; } }
    @media (min-width: 1024px) { .bottom-nav { display: none; } .vouchers-list { grid-template-columns: repeat(3, 1fr); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">💎</div>
    <span class="logo-text">Gift<span>Latam</span></span>
  </a>
  <div class="nav-actions" id="navActions">
    <button class="btn-login" id="navAuthBtn" onclick="window.location='login.html'">Iniciar sesión</button>
    <button class="btn-vender" onclick="window.location='publicar.html'">+ Vender</button>
  </div>
</nav>

<div class="search-wrap">
  <div class="search-inner">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar Netflix, Steam, Spotify, PSN..." oninput="doSearch(this.value)">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="cat-bar">
  <div class="cat-pill active" data-cat="all"       onclick="filterCat(this)">🔥 Todos</div>
  <div class="cat-pill"        data-cat="gaming"    onclick="filterCat(this)">🎮 Gaming</div>
  <div class="cat-pill"        data-cat="streaming" onclick="filterCat(this)">🎬 Streaming</div>
  <div class="cat-pill"        data-cat="retail"    onclick="filterCat(this)">🛒 Retail</div>
  <div class="cat-pill"        data-cat="comida"    onclick="filterCat(this)">🍔 Comida</div>
  <div class="cat-pill"        data-cat="musica"    onclick="filterCat(this)">🎵 Música</div>
  <div class="cat-pill"        data-cat="viajes"    onclick="filterCat(this)">✈️ Viajes</div>
</div>

<div class="filters-row">
  <button class="filter-btn active" data-sort="created_at"  onclick="filterSort(this)">Más nuevos</button>
  <button class="filter-btn"        data-sort="precio_asc"  onclick="filterSort(this)">Precio ↑</button>
  <button class="filter-btn"        data-sort="precio_desc" onclick="filterSort(this)">Precio ↓</button>
  <div class="results-count" id="resultsCount"></div>
</div>

<div class="container">
  <div id="vouchersList">
    <div class="loading"><div class="loading-spinner"></div>Cargando gift cards...</div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.location='index.html'">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio
  </div>
  <div class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Explorar
  </div>
  <div class="nav-item" onclick="window.location='publicar.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Vender
  </div>
  <div class="nav-item" onclick="window.location='explorar.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>Ofertas
  </div>
  <div class="nav-item" onclick="window.location='panel.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil
  </div>
</div>

<script>
var allCards    = [];
var activeCat   = 'all';
var activeSort  = 'created_at';
var searchQuery = '';

var BRAND_LOGOS = {
  'xbox':'https://cdn.simpleicons.org/xbox/107C10',
  'playstation':'https://cdn.simpleicons.org/playstation/003791',
  'psn':'https://cdn.simpleicons.org/playstation/003791',
  'steam':'https://cdn.simpleicons.org/steam/66c0f4',
  'apple':'https://cdn.simpleicons.org/apple/f5f5f7',
  'nintendo':'https://cdn.simpleicons.org/nintendo/E60012',
  'roblox':'https://cdn.simpleicons.org/roblox/E2231A',
  'pubg':'https://cdn.simpleicons.org/pubg/F0B400',
  'spotify':'https://cdn.simpleicons.org/spotify/1ED760',
  'netflix':'https://cdn.simpleicons.org/netflix/E50914',
  'amazon':'https://cdn.simpleicons.org/amazon/FF9900',
  'youtube':'https://cdn.simpleicons.org/youtube/FF0000',
  'discord':'https://cdn.simpleicons.org/discord/5865F2',
  'twitch':'https://cdn.simpleicons.org/twitch/9146FF',
  'minecraft':'https://cdn.simpleicons.org/minecraft/62B47A',
  'epic':'https://cdn.simpleicons.org/epicgames/ffffff',
  'google play':'https://cdn.simpleicons.org/googleplay/414141',
  'valorant':'https://cdn.simpleicons.org/valorant/FF4655'
};

var CAT_ICONS = {
  gaming:'🎮', streaming:'🎬', retail:'🛒', comida:'🍔',
  musica:'🎵', viajes:'✈️', cuenta:'👤', licencia:'🔑',
  gift_card:'🎁', otro:'📄'
};

var CAT_KEYWORDS = {
  gaming:    ['steam','psn','xbox','roblox','nintendo','minecraft','valorant','fortnite','free fire','league','gaming','playstation','epic','pubg'],
  streaming: ['netflix','disney','hbo','prime','amazon video','streaming','hulu','paramount','apple tv','mubi'],
  retail:    ['amazon','mercado','google play','app store','ebay','shein','aliexpress'],
  comida:    ['rappi','pedidos','uber eats','ifood','delivery'],
  musica:    ['spotify','apple music','youtube premium','tidal','deezer'],
  viajes:    ['booking','airbnb','despegar','expedia']
};

/* Construye el bloque de imagen usando DOM — cero escaping manual */
function buildImgBlock(card) {
  var marcaKey = (card.marca || '').toLowerCase().trim();
  var logoUrl  = BRAND_LOGOS[marcaKey];
  var emoji    = CAT_ICONS[card.tipo] || '🎁';
  var wrap     = document.createElement('div');

  if (card.imagen_url) {
    /* Foto/GIF subida — ocupa todo el bloque */
    var img = document.createElement('img');
    img.src   = card.imagen_url;
    img.alt   = card.titulo || '';
    img.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block';

    var fbk = document.createElement('div');
    fbk.className = 'vc-img-emoji';
    fbk.style.display = 'none';
    if (logoUrl) {
      var li = document.createElement('img');
      li.src = logoUrl; li.width = 54; li.height = 54;
      li.style.cssText = 'object-fit:contain';
      li.onerror = function(){ li.parentNode.textContent = emoji; };
      fbk.appendChild(li);
    } else {
      fbk.textContent = emoji;
    }
    img.onerror = function() { img.style.display='none'; fbk.style.display='flex'; };

    wrap.appendChild(img);
    wrap.appendChild(fbk);
    return wrap.innerHTML;
  }

  if (logoUrl) {
    /* Logo de marca centrado */
    var logoDiv = document.createElement('div');
    logoDiv.className = 'vc-img-logo';
    var li2 = document.createElement('img');
    li2.src = logoUrl; li2.width = 54; li2.height = 54;
    li2.style.cssText = 'object-fit:contain';
    li2.onerror = function() { logoDiv.className='vc-img-emoji'; logoDiv.textContent=emoji; };
    logoDiv.appendChild(li2);
    wrap.appendChild(logoDiv);
    return wrap.innerHTML;
  }

  /* Solo emoji */
  var ed = document.createElement('div');
  ed.className = 'vc-img-emoji';
  ed.textContent = emoji;
  wrap.appendChild(ed);
  return wrap.innerHTML;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setLoading() {
  document.getElementById('resultsCount').textContent = '';
  document.getElementById('vouchersList').innerHTML =
    '<div class="loading"><div class="loading-spinner"></div>Cargando gift cards...</div>';
}

function setError(msg, fn) {
  document.getElementById('resultsCount').textContent = '';
  document.getElementById('vouchersList').innerHTML =
    '<div class="empty-state"><span class="empty-state-emoji">⚠️</span>' +
    '<div class="empty-state-title">No pudimos cargar el catálogo</div>' +
    '<div class="empty-state-sub">' + msg + '</div>' +
    '<button class="btn-action" onclick="' + fn + '" style="margin-top:4px">↻ Reintentar</button></div>';
}

function setEmpty() {
  var isSearch = !!searchQuery, isCat = activeCat !== 'all';
  var emoji  = isSearch ? '🔍' : isCat ? '📭' : '🌱';
  var title  = isSearch ? 'Sin resultados para "' + searchQuery + '"'
             : isCat ? 'No hay productos en esta categoría todavía'
             : 'El catálogo está creciendo';
  var sub    = isSearch ? 'Revisá la ortografía o buscá otra marca.'
             : isCat ? 'Sé el primero en publicar aquí.'
             : '¡Publicá la primera gift card!';
  var action = isSearch
    ? '<button class="btn-action" onclick="clearSearch()">← Ver todos</button>'
    : '<a class="btn-action" href="publicar.html">+ Publicar gift card</a>';
  document.getElementById('vouchersList').innerHTML =
    '<div class="empty-state"><span class="empty-state-emoji">' + emoji + '</span>' +
    '<div class="empty-state-title">' + title + '</div>' +
    '<div class="empty-state-sub">' + sub + '</div>' + action + '</div>';
}

async function loadCards() {
  setLoading();
  var tid = setTimeout(function(){ setError('Conexión lenta. Verificá tu internet.','loadCards()'); }, 12000);
  var data, err;
  try {
    var r = await sb.from('gift_cards').select('*').eq('estado','activo').order('created_at',{ascending:false});
    data = r.data; err = r.error;
  } catch(e) {
    clearTimeout(tid);
    setError(e.message || 'Error de red.', 'loadCards()');
    return;
  }
  clearTimeout(tid);
  if (err) { setError(err.message, 'loadCards()'); return; }

  allCards = data || [];

  /* Fetch vendedores en batch */
  var ids = allCards.map(function(c){ return c.seller_id; }).filter(Boolean);
  ids = ids.filter(function(id,i){ return ids.indexOf(id)===i; });
  if (ids.length > 0) {
    try {
      var pr = await sb.from('profiles').select('id,usuario,nombre,email,reputacion,ventas_totales').in('id',ids);
      if (!pr.error && pr.data) {
        var pm = {};
        pr.data.forEach(function(p){ pm[p.id]=p; });
        allCards.forEach(function(c){ c._seller = pm[c.seller_id]||null; });
      }
    } catch(e){ console.warn('Profiles:', e); }
  }

  renderCards();
}

function renderCards() {
  var filtered = allCards.slice();

  if (activeCat !== 'all') {
    var kws = CAT_KEYWORDS[activeCat] || [];
    filtered = filtered.filter(function(c){
      var m=(c.marca||'').toLowerCase(), t=(c.titulo||'').toLowerCase();
      return kws.some(function(k){ return m.indexOf(k)!==-1||t.indexOf(k)!==-1; }) || c.tipo===activeCat;
    });
  }
  if (searchQuery) {
    filtered = filtered.filter(function(c){
      return (c.titulo||'').toLowerCase().indexOf(searchQuery)!==-1 ||
             (c.marca||'').toLowerCase().indexOf(searchQuery)!==-1;
    });
  }
  if (activeSort==='precio_asc')  filtered.sort(function(a,b){ return parseFloat(a.precio_venta||0)-parseFloat(b.precio_venta||0); });
  if (activeSort==='precio_desc') filtered.sort(function(a,b){ return parseFloat(b.precio_venta||0)-parseFloat(a.precio_venta||0); });

  var n = filtered.length;
  document.getElementById('resultsCount').textContent = allCards.length>0 ? (n+' resultado'+(n!==1?'s':'')) : '';
  if (n===0) { setEmpty(); return; }

  var html = filtered.map(function(card) {
    var precio  = parseFloat(card.precio_venta  || 0);
    var nominal = parseFloat(card.valor_nominal || 0);
    var pct     = (nominal>0 && precio<nominal) ? Math.round((1-precio/nominal)*100) : 0;
    var region  = (card.region && card.region!=='Global') ? ' | '+card.region : '';
    var prof    = card._seller || {};
    var seller  = prof.usuario || prof.nombre || (prof.email ? prof.email.split('@')[0] : null) || 'usuario';
    var rep     = prof.reputacion ? parseFloat(prof.reputacion).toFixed(1) : null;
    var nVentas = prof.ventas_totales != null ? parseInt(prof.ventas_totales) : 0;

    /* Stock — null-safe: si columna no existe muestra "Disponible" */
    var qty = (card.cantidad!=null && card.cantidad!==undefined) ? parseInt(card.cantidad) : null;
    var stockHtml = qty===null
      ? '<span class="vc-stock-ok">Disponible</span>'
      : qty<=3
        ? '<span class="vc-stock-low">⚡ '+qty+' restante'+(qty!==1?'s':'')+'</span>'
        : '<span class="vc-stock-ok">'+qty+' en stock</span>';

    var ventasHtml = nVentas>0
      ? '<span class="vc-ventas">'+nVentas+' venta'+(nVentas!==1?'s':'')+'</span>' : '';

    var discBadge = pct>0 ? '<span class="vc-discount">-'+pct+'%</span>' : '';
    var oldPrice  = (nominal>0 && nominal>precio) ? '<span class="vc-price-old">$'+nominal.toFixed(2)+'</span>' : '';
    var repBadge  = rep ? '<span class="vc-rep">★ '+rep+'</span>' : '';

    return '<a href="detalle.html?id='+card.id+'" class="voucher-card">'+
      '<div class="vc-img">'+buildImgBlock(card)+'</div>'+
      '<div class="vc-body">'+
        '<div class="vc-title">'+esc(card.titulo||'')+region+'</div>'+
        '<div class="vc-seller">'+
          '<span class="vc-seller-name">@'+esc(seller)+'</span>'+
          '<span class="vc-verified">✓</span>'+
          repBadge+
        '</div>'+
        '<div class="vc-bottom">'+
          '<div class="vc-price-block">'+
            '<span class="vc-price">$'+precio.toFixed(2)+' USDT</span>'+
            oldPrice+discBadge+
          '</div>'+
          '<div class="vc-meta-right">'+stockHtml+ventasHtml+'</div>'+
        '</div>'+
      '</div>'+
    '</a>';
  }).join('');

  document.getElementById('vouchersList').innerHTML = '<div class="vouchers-list">'+html+'</div>';
}

function doSearch(val) {
  searchQuery = val.toLowerCase().trim();
  document.getElementById('clearBtn').style.display = searchQuery ? 'block' : 'none';
  renderCards();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('clearBtn').style.display = 'none';
  renderCards();
}
function filterCat(el) {
  document.querySelectorAll('.cat-pill').forEach(function(p){ p.classList.remove('active'); });
  el.classList.add('active');
  activeCat = el.dataset.cat;
  renderCards();
}
function filterSort(el) {
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  activeSort = el.dataset.sort;
  renderCards();
}

window.addEventListener('DOMContentLoaded', function() {
  var params = new URLSearchParams(window.location.search);
  var q = params.get('q'), cat = params.get('cat');
  if (q) {
    document.getElementById('searchInput').value = q;
    searchQuery = q.toLowerCase();
    document.getElementById('clearBtn').style.display = 'block';
  }
  if (cat) {
    var pill = document.querySelector('.cat-pill[data-cat="'+cat+'"]');
    if (pill) {
      document.querySelectorAll('.cat-pill').forEach(function(p){ p.classList.remove('active'); });
      pill.classList.add('active'); activeCat = cat;
    }
  }
  if (typeof sb !== 'undefined') {
    sb.auth.getSession().then(function(res) {
      if (res.data && res.data.session) {
        var btn = document.getElementById('navAuthBtn');
        var u   = res.data.session.user;
        var nom = (u.user_metadata && u.user_metadata.usuario) || 'Mi panel';
        if (btn) { btn.textContent='@'+nom; btn.onclick=function(){ window.location.href='panel.html'; }; }
      }
    });
    loadCards();
    limpiarExpiradas(); // limpia órdenes vencidas en background
  } else {
    setError('Supabase no disponible. Abrí la página desde Vercel.', 'location.reload()');
  }
});

// Limpia órdenes pendiente_pago con más de 10 min y restaura stock
async function limpiarExpiradas() {
  try {
    var hace10min = new Date(Date.now() - 10 * 60 * 1000).toISOString();
    var res = await sb.from('ordenes').select('id, gift_card_id').eq('estado','pendiente_pago').lt('created_at', hace10min);
    if (!res.data || res.data.length === 0) return;
    for (var i = 0; i < res.data.length; i++) {
      var o = res.data[i];
      await sb.from('ordenes').update({ estado:'cancelado', updated_at: new Date().toISOString() }).eq('id', o.id);
      if (o.gift_card_id) {
        var sr = await sb.from('gift_cards').select('cantidad').eq('id', o.gift_card_id).single();
        if (sr.data && sr.data.cantidad != null) {
          await sb.from('gift_cards').update({ cantidad: parseInt(sr.data.cantidad) + 1 }).eq('id', o.gift_card_id);
        }
      }
    }
  } catch(e) {}
}
