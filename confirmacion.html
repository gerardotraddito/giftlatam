<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago enviado - GiftLatam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --negro:#080808; --card:#161616; --borde:#222; --blanco:#F0F0F0; --gris:#888; --verde:#00C853; --naranja:#FF6B35; --amarillo:#f3ba2f; }
    body { font-family:'Inter',sans-serif; background:var(--negro); color:var(--blanco); min-height:100vh; padding-bottom:40px; }
    nav { display:flex; align-items:center; padding:0 14px; height:54px; border-bottom:1px solid var(--borde); background:rgba(8,8,8,0.97); backdrop-filter:blur(16px); }
    .logo { display:flex; align-items:center; gap:7px; text-decoration:none; }
    .logo-icon { width:32px; height:32px; background:var(--verde); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; }
    .logo-text { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; color:var(--blanco); }
    .logo-text span { color:var(--verde); }
    .container { max-width:520px; margin:0 auto; padding:28px 16px; }

    .hero { text-align:center; padding:28px 20px 24px; }
    .hero-icon { width:80px; height:80px; margin:0 auto 20px; background:rgba(0,200,83,0.1); border:2px solid rgba(0,200,83,0.3); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:36px; animation:pulse 2.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,200,83,0.3)} 50%{box-shadow:0 0 0 14px rgba(0,200,83,0)} }
    .hero-title { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; margin-bottom:8px; }
    .hero-sub { font-size:14px; color:var(--gris); line-height:1.6; }

    .info-card { background:var(--card); border:1px solid var(--borde); border-radius:16px; padding:16px; margin-bottom:14px; }
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--borde); font-size:13px; }
    .info-row:last-child { border:none; }
    .info-label { color:var(--gris); }
    .info-val { font-weight:600; text-align:right; }

    .ref-box { background:rgba(0,200,83,0.05); border:1px solid rgba(0,200,83,0.2); border-radius:12px; padding:14px 16px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .ref-label { font-size:11px; color:var(--gris); margin-bottom:3px; }
    .ref-val { font-family:'Courier New',monospace; font-size:13px; font-weight:700; color:var(--verde); word-break:break-all; }
    .copy-btn { background:none; border:1px solid var(--borde); border-radius:8px; color:var(--gris); font-size:11px; padding:6px 10px; cursor:pointer; flex-shrink:0; font-family:inherit; transition:all 0.2s; white-space:nowrap; }
    .copy-btn.ok { border-color:var(--verde); color:var(--verde); }

    .tl-item { display:flex; gap:16px; align-items:flex-start; position:relative; margin-bottom:0; }
    .tl-item:not(:last-child)::after { content:''; position:absolute; left:17px; top:38px; width:2px; height:calc(100% - 14px); background:var(--borde); }
    .tl-dot { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; position:relative; z-index:1; }
    .tl-dot.done    { background:rgba(0,200,83,0.15); border:2px solid var(--verde); color:var(--verde); }
    .tl-dot.active  { background:rgba(243,186,47,0.15); border:2px solid var(--amarillo); color:var(--amarillo); animation:blink 1.5s ease-in-out infinite; }
    .tl-dot.pending { background:#1a1a1a; border:2px solid var(--borde); color:var(--gris); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .tl-body { flex:1; padding-bottom:20px; }
    .tl-label { font-size:14px; font-weight:700; margin-bottom:4px; }
    .tl-sub   { font-size:12px; color:var(--gris); line-height:1.5; }

    .aviso { background:rgba(255,107,53,0.07); border:1px solid rgba(255,107,53,0.2); border-radius:12px; padding:14px 16px; font-size:12px; color:#bbb; line-height:1.7; margin-bottom:14px; }
    .aviso strong { color:var(--naranja); }

    .btn-primary   { display:block; width:100%; background:var(--verde); color:#000; border:none; border-radius:14px; padding:15px; font-family:'Syne',sans-serif; font-weight:800; font-size:15px; cursor:pointer; text-align:center; text-decoration:none; margin-bottom:10px; }
    .btn-secondary { display:block; width:100%; background:transparent; color:var(--gris); border:1px solid var(--borde); border-radius:14px; padding:14px; font-family:inherit; font-size:14px; text-align:center; text-decoration:none; }
    .btn-secondary:hover { border-color:var(--verde); color:var(--verde); }
    .soporte { text-align:center; font-size:12px; color:var(--gris); margin-top:20px; line-height:1.8; }
    .soporte a { color:var(--verde); text-decoration:none; }
    .spinner { width:28px; height:28px; border:3px solid #333; border-top-color:var(--verde); border-radius:50%; animation:spin 0.8s linear infinite; margin:60px auto; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">💎</div>
    <span class="logo-text">Gift<span>Latam</span></span>
  </a>
</nav>

<div class="container" id="main">
  <div class="spinner"></div>
</div>

<script>
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.addEventListener('DOMContentLoaded', async function() {
  var params  = new URLSearchParams(window.location.search);
  var ordenId = params.get('orden_id');
  var red     = params.get('red') || 'TRC20';
  var monto   = parseFloat(params.get('monto')) || 0;

  var orden = null;
  var card  = null;

  if (ordenId && typeof sb !== 'undefined') {
    try {
      var r = await sb.from('ordenes').select('*').eq('id', ordenId).single();
      if (r.data) orden = r.data;
    } catch(e) {}
    if (orden && orden.gift_card_id) {
      try {
        var rc = await sb.from('gift_cards').select('titulo,marca').eq('id', orden.gift_card_id).single();
        if (rc.data) card = rc.data;
      } catch(e) {}
    }
  }

  var titulo  = card ? card.titulo : 'Gift Card';
  var precio  = orden ? parseFloat(orden.precio || 0) : monto;
  var redFinal = (orden && orden.red) ? orden.red : red;
  var refId   = ordenId ? ordenId.substring(0,8).toUpperCase() : ('GL-' + Date.now().toString(36).toUpperCase());

  document.getElementById('main').innerHTML =
    '<div class="hero">' +
      '<div class="hero-icon">⏳</div>' +
      '<div class="hero-title">¡Pago enviado!</div>' +
      '<div class="hero-sub">Registramos tu confirmación.<br>Estamos verificando tu depósito en la blockchain.</div>' +
    '</div>' +

    '<div class="ref-box">' +
      '<div><div class="ref-label">Número de orden</div><div class="ref-val" id="refVal">' + refId + '</div></div>' +
      '<button class="copy-btn" id="copyBtn" onclick="copyRef()">Copiar</button>' +
    '</div>' +

    '<div class="info-card">' +
      '<div class="info-row"><span class="info-label">Producto</span><span class="info-val">' + esc(titulo) + '</span></div>' +
      '<div class="info-row"><span class="info-label">Monto</span><span class="info-val" style="color:var(--verde)">$' + precio.toFixed(2) + ' USDT</span></div>' +
      '<div class="info-row"><span class="info-label">Red</span><span class="info-val">' + redFinal + '</span></div>' +
      '<div class="info-row"><span class="info-label">Estado</span><span class="info-val" style="color:var(--amarillo)">⏳ Verificando</span></div>' +
    '</div>' +

    '<div class="tl-item"><div class="tl-dot done">✓</div><div class="tl-body"><div class="tl-label">Pago confirmado por vos</div><div class="tl-sub">Registramos tu aviso. Verificamos el depósito.</div></div></div>' +
    '<div class="tl-item"><div class="tl-dot active">⏳</div><div class="tl-body"><div class="tl-label">Verificando en blockchain</div><div class="tl-sub">Confirmamos que el monto llegó al escrow. Tiempo estimado: <strong style="color:var(--blanco)">5 a 30 minutos</strong>.</div></div></div>' +
    '<div class="tl-item" style="margin-top:0"><div class="tl-dot pending">3</div><div class="tl-body"><div class="tl-label" style="color:var(--gris)">Código entregado</div><div class="tl-sub">El código aparece en tu panel una vez confirmado.</div></div></div>' +

    '<div style="margin-top:20px"></div>' +
    '<div class="aviso">⚠️ <strong>Importante:</strong> Asegurate de haber enviado <strong>exactamente $' + precio.toFixed(2) + ' USDT</strong> por red <strong>' + redFinal + '</strong>. Si enviaste un monto diferente o por otra red, abrí una disputa.</div>' +

    '<a href="panel.html" class="btn-primary">Ver en mi panel →</a>' +
    '<a href="explorar.html" class="btn-secondary">Seguir explorando</a>' +
    '<div class="soporte">¿Problema? <a href="disputas.html">Abrí una disputa</a><br>Referencia: <strong style="color:var(--blanco)">' + refId + '</strong></div>';
});

function copyRef() {
  var val = document.getElementById('refVal');
  var btn = document.getElementById('copyBtn');
  if (!val || !btn) return;
  function ok(){ btn.textContent='✓ Copiado'; btn.classList.add('ok'); setTimeout(function(){ btn.textContent='Copiar'; btn.classList.remove('ok'); },2000); }
  if (navigator.clipboard) { navigator.clipboard.writeText(val.textContent).then(ok).catch(function(){ fb(); }); }
  else { fb(); }
  function fb(){ var t=document.createElement('textarea'); t.value=val.textContent; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); ok(); }
}
</script>
</body>
</html>
