<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago enviado - GiftLatam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --negro: #080808; --card: #161616; --borde: #222;
      --blanco: #F0F0F0; --gris: #888; --verde: #00C853; --naranja: #FF6B35;
    }
    body { font-family: 'Inter', sans-serif; background: var(--negro); color: var(--blanco); min-height: 100vh; padding-bottom: 40px; }
    nav { display: flex; align-items: center; padding: 0 14px; height: 54px; border-bottom: 1px solid var(--borde); background: rgba(8,8,8,0.97); backdrop-filter: blur(16px); gap: 10px; }
    .logo { display: flex; align-items: center; gap: 7px; text-decoration: none; }
    .logo-icon { width: 32px; height: 32px; background: var(--verde); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 18px; height: 18px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--blanco); }
    .logo-text span { color: var(--verde); }
    .container { max-width: 520px; margin: 0 auto; padding: 28px 16px; }

    /* Hero */
    .hero { text-align: center; padding: 28px 20px 24px; }
    .hero-icon {
      width: 80px; height: 80px; margin: 0 auto 20px;
      background: rgba(0,200,83,0.1); border: 2px solid rgba(0,200,83,0.3);
      border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 36px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,200,83,0.3)} 50%{box-shadow:0 0 0 14px rgba(0,200,83,0)} }
    .hero-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .hero-sub { font-size: 14px; color: var(--gris); line-height: 1.6; }

    /* Timer */
    .timer-box {
      background: var(--card); border: 1px solid var(--borde);
      border-radius: 16px; padding: 20px; margin-bottom: 14px; text-align: center;
    }
    .timer-label { font-size: 12px; color: var(--gris); margin-bottom: 10px; }
    .timer-display {
      font-family: 'Syne', sans-serif; font-size: 44px; font-weight: 800;
      font-variant-numeric: tabular-nums; letter-spacing: 2px;
      transition: color 0.5s;
    }
    .timer-display.urgente { color: var(--naranja); }
    .timer-display.ok      { color: var(--verde); }
    .timer-sub { font-size: 12px; color: var(--gris); margin-top: 8px; }
    .timer-bar-wrap { background: #1a1a1a; border-radius: 99px; height: 4px; margin-top: 12px; overflow: hidden; }
    .timer-bar { height: 100%; background: var(--verde); border-radius: 99px; transition: width 1s linear, background 0.5s; }

    /* Info card */
    .info-card { background: var(--card); border: 1px solid var(--borde); border-radius: 16px; padding: 16px; margin-bottom: 14px; }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--borde); font-size: 13px; }
    .info-row:last-child { border: none; }
    .info-label { color: var(--gris); }
    .info-val { font-weight: 600; text-align: right; }

    /* Referencia */
    .ref-box {
      background: rgba(0,200,83,0.05); border: 1px solid rgba(0,200,83,0.2);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .ref-label { font-size: 11px; color: var(--gris); margin-bottom: 3px; }
    .ref-val { font-family: 'Courier New', monospace; font-size: 13px; font-weight: 700; color: var(--verde); word-break: break-all; }
    .copy-btn { background: none; border: 1px solid var(--borde); border-radius: 8px; color: var(--gris); font-size: 11px; padding: 6px 10px; cursor: pointer; flex-shrink: 0; font-family: inherit; transition: all 0.2s; white-space: nowrap; }
    .copy-btn:hover, .copy-btn.ok { border-color: var(--verde); color: var(--verde); }

    /* Timeline */
    .timeline { display: flex; flex-direction: column; gap: 0; margin: 20px 0; }
    .tl-item { display: flex; gap: 16px; align-items: flex-start; position: relative; }
    .tl-item:not(:last-child)::after { content:''; position:absolute; left:17px; top:38px; width:2px; height:calc(100% - 14px); background:var(--borde); }
    .tl-dot { width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; position:relative; z-index:1; }
    .tl-dot.done    { background:rgba(0,200,83,0.15); border:2px solid var(--verde); color:var(--verde); }
    .tl-dot.active  { background:rgba(243,186,47,0.15); border:2px solid #f3ba2f; color:#f3ba2f; animation:blink 1.5s ease-in-out infinite; }
    .tl-dot.pending { background:#1a1a1a; border:2px solid var(--borde); color:var(--gris); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }
    .tl-body { flex:1; padding-bottom:20px; }
    .tl-label { font-size:14px; font-weight:700; line-height:1; margin-bottom:4px; }
    .tl-sub   { font-size:12px; color:var(--gris); line-height:1.5; }

    /* Aviso */
    .aviso { background:rgba(255,107,53,0.07); border:1px solid rgba(255,107,53,0.2); border-radius:12px; padding:14px 16px; font-size:12px; color:#bbb; line-height:1.7; margin-bottom:14px; }
    .aviso strong { color:var(--naranja); }

    /* Expirado */
    .expirado-box { background:rgba(255,107,53,0.08); border:1px solid rgba(255,107,53,0.3); border-radius:16px; padding:20px; text-align:center; margin-bottom:14px; display:none; }
    .expirado-icon { font-size:40px; margin-bottom:12px; }
    .expirado-title { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; color:var(--naranja); margin-bottom:8px; }
    .expirado-sub { font-size:13px; color:#bbb; line-height:1.6; }

    /* Botones */
    .btn-primary   { display:block; width:100%; background:var(--verde); color:#000; border:none; border-radius:14px; padding:15px; font-family:'Syne',sans-serif; font-weight:800; font-size:15px; cursor:pointer; text-align:center; text-decoration:none; margin-bottom:10px; }
    .btn-secondary { display:block; width:100%; background:transparent; color:var(--gris); border:1px solid var(--borde); border-radius:14px; padding:14px; font-family:inherit; font-size:14px; cursor:pointer; text-align:center; text-decoration:none; }
    .btn-secondary:hover { border-color:var(--verde); color:var(--verde); }

    .soporte { text-align:center; font-size:12px; color:var(--gris); margin-top:20px; line-height:1.8; }
    .soporte a { color:var(--verde); text-decoration:none; }
    .spinner { width:28px; height:28px; border:3px solid #333; border-top-color:var(--verde); border-radius:50%; animation:spin 0.8s linear infinite; margin:60px auto; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 44 44" fill="none"><rect width="44" height="44" rx="11" fill="#00C853"/><polygon points="22,10 32,22 22,34 12,22" fill="#003D1A" opacity="0.6"/><polygon points="22,10 32,22 22,34 12,22" fill="#00FF6E" opacity="0.85" transform="scale(0.6) translate(14.7,14.7)"/></svg>
    </div>
    <span class="logo-text">Gift<span>Latam</span></span>
  </a>
</nav>

<div class="container" id="mainContent">
  <div class="spinner"></div>
</div>

<script>
var TIMER_TOTAL = 10 * 60; // 10 minutos en segundos
var timerInterval = null;
var giftId, txId, red, precio, expiresAt;

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.addEventListener('DOMContentLoaded', async function() {
  var params = new URLSearchParams(window.location.search);
  giftId    = params.get('id');
  txId      = params.get('tx');
  red       = params.get('red') || 'TRC20';
  precio    = parseFloat(params.get('monto')) || 0;
  expiresAt = parseInt(params.get('exp')) || (Date.now() + TIMER_TOTAL * 1000);

  // También leer de localStorage como fallback
  try {
    var saved = JSON.parse(localStorage.getItem('gl_pago_pending') || 'null');
    if (saved && saved.giftId === giftId) {
      if (!txId && saved.txId) txId = saved.txId;
      if (saved.expiresAt) expiresAt = saved.expiresAt;
    }
  } catch(e) {}

  // Cargar datos del producto
  var card = null;
  if (giftId && typeof sb !== 'undefined') {
    try {
      var r = await sb.from('gift_cards').select('titulo, marca, region, precio_venta').eq('id', giftId).single();
      if (r.data) card = r.data;
    } catch(e) {}
  }

  var titulo  = card ? card.titulo : 'Gift Card';
  if (!precio && card) precio = parseFloat(card.precio_venta) || 0;
  var orderId = txId || ('GL-' + Date.now().toString(36).toUpperCase());

  // ── Render página ──
  document.getElementById('mainContent').innerHTML =

    '<div class="hero">' +
      '<div class="hero-icon">⏳</div>' +
      '<div class="hero-title">¡Pago enviado!</div>' +
      '<div class="hero-sub">Registramos tu aviso.<br>Verificamos el depósito en la blockchain.</div>' +
    '</div>' +

    // Timer
    '<div class="timer-box">' +
      '<div class="timer-label">Tiempo para confirmar tu depósito</div>' +
      '<div class="timer-display ok" id="timerDisplay">10:00</div>' +
      '<div class="timer-sub" id="timerSub">Si el tiempo vence, el stock se libera y debés iniciar una nueva compra.</div>' +
      '<div class="timer-bar-wrap"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>' +
    '</div>' +

    // Estado expirado (oculto al inicio)
    '<div class="expirado-box" id="expiradoBox">' +
      '<div class="expirado-icon">⏰</div>' +
      '<div class="expirado-title">Tiempo agotado</div>' +
      '<div class="expirado-sub">El tiempo de reserva venció. El stock fue liberado.<br>Podés iniciar una nueva compra si el producto sigue disponible.</div>' +
    '</div>' +

    // Referencia
    '<div class="ref-box">' +
      '<div>' +
        '<div class="ref-label">Número de referencia</div>' +
        '<div class="ref-val" id="refVal">' + orderId + '</div>' +
      '</div>' +
      '<button class="copy-btn" id="copyBtn" onclick="copyRef()">Copiar</button>' +
    '</div>' +

    // Resumen
    '<div class="info-card">' +
      '<div class="info-row"><span class="info-label">Producto</span><span class="info-val">' + esc(titulo) + '</span></div>' +
      '<div class="info-row"><span class="info-label">Monto</span><span class="info-val" style="color:var(--verde)">$' + precio.toFixed(2) + ' USDT</span></div>' +
      '<div class="info-row"><span class="info-label">Red</span><span class="info-val">' + red + '</span></div>' +
      '<div class="info-row"><span class="info-label">Estado</span><span class="info-val" id="estadoVal" style="color:#f3ba2f">⏳ Verificando</span></div>' +
    '</div>' +

    // Timeline
    '<div class="timeline">' +
      tl('done',    '✓', 'Pago confirmado por vos', 'Registramos tu aviso. Ahora verificamos el depósito.') +
      tl('active',  '⏳', 'Verificando en blockchain', 'Confirmamos que el monto exacto llegó al escrow. Tiempo estimado: <strong style="color:var(--blanco)">5 a 30 minutos</strong>.') +
      tl('pending', '3',  'Código entregado', 'Una vez confirmado el pago, el código aparece en tu panel.') +
    '</div>' +

    // Aviso
    '<div class="aviso">⚠️ <strong>Importante:</strong> Asegurate de haber enviado <strong>exactamente $' + precio.toFixed(2) + ' USDT</strong> por red <strong>' + red + '</strong>. Si enviaste un monto diferente o por otra red, contactanos antes de que el tiempo venza.</div>' +

    // Botones
    '<a href="panel.html" class="btn-primary" id="btnPanel">Ver en mi panel →</a>' +
    '<a href="explorar.html" class="btn-secondary">Seguir explorando</a>' +

    '<div class="soporte">¿Problema? <a href="disputas.html">Abrí una disputa</a><br>Referencia: <strong style="color:var(--blanco)">' + orderId + '</strong></div>';

  // Iniciar timer
  iniciarTimer();
});

function tl(cls, num, label, sub) {
  return '<div class="tl-item">' +
    '<div class="tl-dot ' + cls + '">' + num + '</div>' +
    '<div class="tl-body">' +
      '<div class="tl-label">' + label + '</div>' +
      '<div class="tl-sub">' + sub + '</div>' +
    '</div>' +
  '</div>';
}

function iniciarTimer() {
  function tick() {
    var ahora     = Date.now();
    var restante  = Math.max(0, Math.floor((expiresAt - ahora) / 1000));
    var pct       = Math.max(0, (restante / TIMER_TOTAL) * 100);
    var mins      = Math.floor(restante / 60);
    var segs      = restante % 60;
    var display   = document.getElementById('timerDisplay');
    var bar       = document.getElementById('timerBar');
    var sub       = document.getElementById('timerSub');

    if (!display) { clearInterval(timerInterval); return; }

    display.textContent = String(mins).padStart(2,'0') + ':' + String(segs).padStart(2,'0');

    // Colorear según urgencia
    if (restante <= 120) {
      display.className = 'timer-display urgente';
      if (bar) { bar.style.background = 'var(--naranja)'; }
      if (sub)  sub.textContent = '⚠️ Menos de 2 minutos. Confirmá tu pago ahora.';
    } else if (restante <= 300) {
      display.className = 'timer-display urgente';
      if (bar) bar.style.background = '#f3ba2f';
    } else {
      display.className = 'timer-display ok';
    }
    if (bar) bar.style.width = pct + '%';

    if (restante === 0) {
      clearInterval(timerInterval);
      onExpirado();
    }
  }

  tick();
  timerInterval = setInterval(tick, 1000);
}

async function onExpirado() {
  // Restaurar stock
  if (giftId && typeof sb !== 'undefined') {
    try {
      var r = await sb.from('gift_cards').select('cantidad').eq('id', giftId).single();
      var cant = r.data && r.data.cantidad != null ? parseInt(r.data.cantidad) : 0;
      await sb.from('gift_cards').update({ cantidad: cant + 1 }).eq('id', giftId);
    } catch(e) { console.warn('restore stock:', e); }

    // Marcar transaction como expirada
    if (txId) {
      try {
        await sb.from('transactions').update({ estado: 'expirado' }).eq('id', txId);
      } catch(e) {}
      try {
        await sb.from('orders').update({ estado: 'expirado' }).eq('id', txId);
      } catch(e) {}
    }
  }

  // Limpiar localStorage
  try { localStorage.removeItem('gl_pago_pending'); } catch(e) {}

  // Mostrar estado expirado
  var box = document.getElementById('expiradoBox');
  if (box) box.style.display = 'block';
  var est = document.getElementById('estadoVal');
  if (est) { est.textContent = '⏰ Expirado'; est.style.color = 'var(--naranja)'; }
  var timer = document.querySelector('.timer-box');
  if (timer) timer.style.opacity = '0.4';

  // Cambiar botón
  var btn = document.getElementById('btnPanel');
  if (btn) {
    btn.textContent = 'Volver al producto →';
    btn.href = giftId ? 'detalle.html?id=' + giftId : 'explorar.html';
  }
}

function copyRef() {
  var val = document.getElementById('refVal');
  var btn = document.getElementById('copyBtn');
  if (!val || !btn) return;
  var text = val.textContent;
  function ok() {
    btn.textContent = '✓ Copiado'; btn.classList.add('ok');
    setTimeout(function(){ btn.textContent='Copiar'; btn.classList.remove('ok'); }, 2000);
  }
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(ok).catch(function(){
      var ta=document.createElement('textarea'); ta.value=text;
      document.body.appendChild(ta); ta.select(); document.execCommand('copy');
      document.body.removeChild(ta); ok();
    });
  } else {
    var ta=document.createElement('textarea'); ta.value=text;
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); ok();
  }
}
</script>
</body>
</html>
