<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GiftLatam - Confirmar pago</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --negro: #080808; --oscuro: #111111; --card: #161616;
      --borde: #222222; --blanco: #F0F0F0; --gris: #888888;
      --verde: #00C853; --naranja: #FF6B35;
    }
    html, body { max-width: 100%; overflow-x: hidden; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--negro); color: var(--blanco);
      padding-bottom: 90px;
    }
    nav {
      display: flex; align-items: center;
      padding: 0 14px; height: 54px;
      border-bottom: 1px solid var(--borde);
      position: sticky; top: 0; z-index: 1000;
      background: rgba(8,8,8,0.97); backdrop-filter: blur(16px);
      gap: 10px;
    }
    .logo { display: flex; align-items: center; gap: 7px; text-decoration: none; flex-shrink: 0; }
    .logo-icon { width: 32px; height: 32px; background: var(--verde); border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 18px; height: 18px; }
    .logo-text { font-weight: 800; font-size: 19px; color: var(--blanco); white-space: nowrap; }
    .logo-text .g { color: var(--verde); }
    .nav-spacer { flex: 1; }
    .nav-back { font-size: 13px; color: var(--gris); text-decoration: none; }
    .nav-back:hover { color: var(--verde); }
    .container { max-width: 860px; margin: 0 auto; padding: 0 14px; }
    .main { padding: 22px 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 28px; height: 28px; border: 3px solid #333; border-top-color: var(--verde); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 50px auto; }

    .pago-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 700px) { .pago-grid { grid-template-columns: 1fr 300px; } }

    .pago-card { background: var(--card); border: 1px solid var(--borde); border-radius: 20px; padding: 20px; }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

    .order-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--borde); font-size: 13px; }
    .order-row:last-child { border: none; }
    .order-label { color: var(--gris); }
    .order-total-val { font-size: 20px; font-weight: 800; color: var(--verde); font-variant-numeric: tabular-nums; }

    .crypto-methods { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .crypto-method {
      display: flex; align-items: center; gap: 12px;
      background: var(--negro); border: 2px solid var(--borde);
      border-radius: 13px; padding: 13px 14px; cursor: pointer;
      transition: border-color 0.2s;
    }
    .crypto-method:hover { border-color: rgba(0,200,83,0.4); }
    .crypto-method.selected { border-color: var(--verde); background: rgba(0,200,83,0.04); }
    .cm-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; flex-shrink: 0; }
    .cm-icon.trc { background: rgba(230,57,70,0.14); color: #ff6b6b; }
    .cm-icon.bep { background: rgba(243,186,47,0.14); color: #f3ba2f; }
    .cm-info { flex: 1; }
    .cm-name { font-weight: 700; font-size: 14px; }
    .cm-sub { font-size: 11px; color: var(--gris); margin-top: 2px; }
    .cm-check { width: 20px; height: 20px; border: 2px solid var(--borde); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
    .crypto-method.selected .cm-check { background: var(--verde); border-color: var(--verde); }
    .cm-check::after { content: ''; width: 6px; height: 6px; background: #000; border-radius: 50%; display: none; }
    .crypto-method.selected .cm-check::after { display: block; }

    .network-badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 700; margin-bottom: 14px; }
    .network-badge.trc { background: rgba(230,57,70,0.12); color: #ff6b6b; border: 1px solid rgba(230,57,70,0.3); }
    .network-badge.bep { background: rgba(243,186,47,0.12); color: #f3ba2f; border: 1px solid rgba(243,186,47,0.3); }

    .amount-box { background: rgba(0,200,83,0.06); border: 1px solid rgba(0,200,83,0.2); border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
    .amount-val { font-weight: 800; color: var(--verde); font-variant-numeric: tabular-nums; font-size: 18px; }

    .qr-box { background: white; border-radius: 14px; padding: 14px; text-align: center; margin-bottom: 12px; }
    .qr-box img { display: block; margin: 0 auto; border-radius: 4px; }
    .qr-label { font-size: 11px; color: #777; margin-top: 8px; }

    .addr-wrapper { position: relative; margin-bottom: 12px; }
    .addr-box { background: var(--negro); border: 1px solid var(--borde); border-radius: 10px; padding: 10px 44px 10px 12px; font-size: 11px; color: #bbb; word-break: break-all; line-height: 1.6; font-family: 'Courier New', monospace; }
    .copy-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gris); transition: color 0.2s; }
    .copy-btn:hover, .copy-btn.copied { color: var(--verde); }

    .warning-box { background: rgba(255,107,53,0.07); border: 1px solid rgba(255,107,53,0.2); border-radius: 10px; padding: 11px 13px; font-size: 11px; color: #bbb; line-height: 1.6; margin-bottom: 14px; }
    .warning-box strong { color: var(--naranja); }
    .escrow-badge { background: rgba(0,200,83,0.06); border: 1px solid rgba(0,200,83,0.15); border-radius: 10px; padding: 12px 14px; font-size: 12px; color: #aaa; line-height: 1.6; margin-bottom: 16px; }

    .btn-confirm { background: var(--verde); color: #000; border: none; border-radius: 14px; padding: 14px; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; cursor: pointer; width: 100%; }
    .btn-confirm:disabled { opacity: 0.6; cursor: not-allowed; }

    .product-mini-card { background: var(--card); border: 1px solid var(--borde); border-radius: 20px; overflow: hidden; }
    .product-mini-img { width: 100%; height: 150px; display: flex; align-items: center; justify-content: center; font-size: 60px; overflow: hidden; }
    .product-mini-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-mini-body { padding: 16px; }
    .product-mini-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .product-mini-sub { font-size: 12px; color: var(--gris); line-height: 1.5; margin-bottom: 12px; }
    .product-mini-price { font-size: 22px; font-weight: 800; color: var(--verde); font-variant-numeric: tabular-nums; }

    .steps { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
    .step { display: flex; gap: 12px; align-items: flex-start; background: var(--negro); border: 1px solid var(--borde); border-radius: 12px; padding: 12px 14px; }
    .step-num { width: 26px; height: 26px; border-radius: 7px; flex-shrink: 0; background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: var(--verde); }
    .step-text { font-size: 12px; color: #ccc; line-height: 1.5; }
    .step-text strong { color: var(--blanco); font-weight: 600; }

    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(14,14,14,0.97); border-top: 1px solid var(--borde); display: flex; justify-content: space-around; align-items: center; padding: 8px 0 14px; z-index: 9999; backdrop-filter: blur(20px); }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: var(--gris); font-size: 10px; padding: 2px 8px; }
    .nav-item svg { width: 21px; height: 21px; }
    @media (min-width: 1024px) { .bottom-nav { display: none; } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 44 44" fill="none"><rect width="44" height="44" rx="11" fill="#00C853"/><polygon points="22,10 32,22 22,34 12,22" fill="#003D1A" opacity="0.6"/><polygon points="22,10 32,22 22,34 12,22" fill="#00FF6E" opacity="0.85" transform="scale(0.6) translate(14.7,14.7)"/></svg></div>
    <span class="logo-text">Gift<span class="g">Latam</span></span>
  </a>
  <div class="nav-spacer"></div>
  <a class="nav-back" id="backLink" href="explorar.html">← Volver al detalle</a>
</nav>

<div class="container">
  <div class="main" id="mainContent">
    <div class="spinner"></div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.location='index.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</div>
  <div class="nav-item" onclick="window.location='explorar.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Explorar</div>
  <div class="nav-item" onclick="window.location='publicar.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Vender</div>
  <div class="nav-item" onclick="window.location='explorar.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>Ofertas</div>
  <div class="nav-item" onclick="window.location='panel.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil</div>
</div>

<script>
// ── WALLETS DE RECEPCIÓN ─────────────────────────────────────────────────
// ⚠️ Reemplazá estas con tus direcciones reales de USDT
var WALLETS = {
  trc20: 'TXnbM7ZGpRZbhCBCm7UwJZWcRMbB5L9Kzt',
  bep20: '0x4A7bF2D8eC6E1F3a9b5D0C2E8F1A6B3C7D4E9F2A'
};

var CARD_DATA = null; // guardamos los datos del producto

// ── LOGOS / FONDOS ───────────────────────────────────────────────────────
var brandLogos = {
  'xbox':'https://cdn.simpleicons.org/xbox/107C10','playstation':'https://cdn.simpleicons.org/playstation/003791',
  'psn':'https://cdn.simpleicons.org/playstation/003791','steam':'https://cdn.simpleicons.org/steam/66c0f4',
  'apple':'https://cdn.simpleicons.org/apple/f5f5f7','spotify':'https://cdn.simpleicons.org/spotify/1ED760',
  'netflix':'https://cdn.simpleicons.org/netflix/E50914','nintendo':'https://cdn.simpleicons.org/nintendo/E60012',
  'roblox':'https://cdn.simpleicons.org/roblox/E2231A','youtube':'https://cdn.simpleicons.org/youtube/FF0000',
  'amazon':'https://cdn.simpleicons.org/amazon/FF9900','discord':'https://cdn.simpleicons.org/discord/5865F2',
  'twitch':'https://cdn.simpleicons.org/twitch/9146FF'
};
var brandBgs = {
  'steam':'rgba(102,192,244,0.12)','xbox':'rgba(16,124,16,0.15)','playstation':'rgba(0,55,145,0.15)',
  'psn':'rgba(0,55,145,0.15)','spotify':'rgba(30,215,96,0.15)','netflix':'rgba(229,9,20,0.15)',
  'apple':'rgba(255,255,255,0.07)','nintendo':'rgba(230,0,18,0.15)','roblox':'rgba(226,35,26,0.15)',
  'youtube':'rgba(255,0,0,0.15)','amazon':'rgba(255,153,0,0.15)'
};
function getBg(m) { return brandBgs[(m||'').toLowerCase().trim()] || 'rgba(0,200,83,0.1)'; }
function getLogo(m, sz) {
  var url = brandLogos[(m||'').toLowerCase().trim()];
  return url ? '<img src="'+url+'" width="'+sz+'" height="'+sz+'" alt="'+m+'" style="object-fit:contain">' : '🎁';
}

// ── INIT ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  var params = new URLSearchParams(window.location.search);
  var id     = params.get('id');
  var main   = document.getElementById('mainContent');

  if (!id) {
    main.innerHTML = '<p style="color:var(--gris);text-align:center;padding:50px 0">Sin producto especificado. <a href="explorar.html" style="color:var(--verde)">← Volver</a></p>';
    return;
  }

  document.getElementById('backLink').href = 'detalle.html?id=' + id;

  if (typeof sb === 'undefined') {
    main.innerHTML = '<p style="color:var(--gris);text-align:center;padding:50px 0">Error de configuración. Recargá la página.</p>';
    return;
  }

  var result = await sb.from('gift_cards').select('*').eq('id', id).single();
  var card   = result.data;
  var err    = result.error;

  if (err || !card) {
    main.innerHTML = '<p style="color:var(--gris);text-align:center;padding:50px 0">Producto no encontrado. <a href="explorar.html" style="color:var(--verde)">← Ver catálogo</a></p>';
    return;
  }

  CARD_DATA = card;
  renderPago(card);
});

// ── RENDER PRINCIPAL ─────────────────────────────────────────────────────
function renderPago(card) {
  var precio   = parseFloat(card.precio_venta) || 0;
  var nominal  = parseFloat(card.valor_nominal) || 0;
  var desc     = (nominal > 0 && precio < nominal) ? nominal - precio : 0;
  var pct      = desc > 0 ? Math.round((desc / nominal) * 100) : 0;
  var marca    = card.marca || '';
  var bg       = getBg(marca);

  var imgBlock = card.imagen_url
    ? '<img src="'+card.imagen_url+'" alt="'+card.titulo+'" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML=\''+getLogo(marca,64)+'\'">'
    : getLogo(marca, 64);

  document.getElementById('mainContent').innerHTML =
    '<div style="margin-bottom:20px">' +
      '<div style="font-size:20px;font-weight:800;margin-bottom:4px">🔒 Confirmar pago</div>' +
      '<div style="font-size:13px;color:var(--gris)">Revisá tu pedido y elegí cómo pagar en USDT</div>' +
    '</div>' +
    '<div class="pago-grid">' +

      // ── Columna principal
      '<div style="display:flex;flex-direction:column;gap:14px">' +

        // Resumen
        '<div class="pago-card">' +
          '<div class="card-title">Resumen del pedido</div>' +
          '<div class="order-row"><span class="order-label">Producto</span><span style="font-weight:600;text-align:right">'+card.titulo+'</span></div>' +
          '<div class="order-row"><span class="order-label">Marca</span><span>'+marca+'</span></div>' +
          '<div class="order-row"><span class="order-label">Región</span><span>'+(card.region||'Global')+'</span></div>' +
          (nominal > 0 ? '<div class="order-row"><span class="order-label">Valor nominal</span><span style="text-decoration:line-through;color:var(--gris)">$'+nominal.toFixed(2)+' USD</span></div>' : '') +
          (desc > 0 ? '<div class="order-row"><span class="order-label">Ahorrás</span><span style="color:var(--verde)">-$'+desc.toFixed(2)+' (-'+pct+'%)</span></div>' : '') +
          '<div class="order-row"><span class="order-label">Comisión</span><span style="color:var(--verde)">Gratis</span></div>' +
          '<div class="order-row"><span style="font-weight:700;font-size:14px">Total a pagar</span><span class="order-total-val">$'+precio.toFixed(2)+' USDT</span></div>' +
        '</div>' +

        // Método de pago
        '<div class="pago-card">' +
          '<div class="card-title">Método de pago</div>' +
          '<div class="crypto-methods" id="cryptoMethods">' +
            '<div class="crypto-method selected" data-net="trc20" onclick="selectNet(\'trc20\')">' +
              '<div class="cm-icon trc">₮</div>' +
              '<div class="cm-info"><div class="cm-name">USDT · Red TRC20</div><div class="cm-sub">Tether en red TRON · comisiones muy bajas</div></div>' +
              '<div class="cm-check"></div>' +
            '</div>' +
            '<div class="crypto-method" data-net="bep20" onclick="selectNet(\'bep20\')">' +
              '<div class="cm-icon bep">₮</div>' +
              '<div class="cm-info"><div class="cm-name">USDT · Red BEP20</div><div class="cm-sub">Tether en BNB Smart Chain · rápido</div></div>' +
              '<div class="cm-check"></div>' +
            '</div>' +
          '</div>' +
          '<div id="pagoInstructions"></div>' +
          '<div class="escrow-badge">🔒 Tu pago está protegido por escrow. El código se libera al confirmar el depósito en la blockchain. Si hay un problema, podés abrir una disputa.</div>' +
          '<button class="btn-confirm" onclick="confirmarPago()">Ya pagué — Confirmar →</button>' +
        '</div>' +
      '</div>' +

      // ── Columna lateral
      '<div>' +
        '<div class="product-mini-card">' +
          '<div class="product-mini-img" style="background:'+bg+'">'+imgBlock+'</div>' +
          '<div class="product-mini-body">' +
            '<div class="product-mini-title">'+card.titulo+'</div>' +
            '<div class="product-mini-sub">'+(card.descripcion||'Gift card digital. Entrega inmediata del código tras confirmar el pago.')+'</div>' +
            '<div class="product-mini-price">$'+precio.toFixed(2)+' USDT</div>' +
            (pct > 0 ? '<div style="font-size:12px;color:var(--gris);margin-top:4px">Valor original: <span style="text-decoration:line-through">$'+nominal.toFixed(2)+'</span> <span style="color:var(--verde);font-weight:700">-'+pct+'%</span></div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="steps" style="margin-top:14px">' +
          '<div style="font-size:13px;font-weight:700;margin-bottom:2px">¿Cómo funciona?</div>' +
          '<div class="step"><div class="step-num">1</div><div class="step-text"><strong>Elegí la red</strong> TRC20 o BEP20 — ambas son USDT válido.</div></div>' +
          '<div class="step"><div class="step-num">2</div><div class="step-text"><strong>Enviá exactamente</strong> $'+precio.toFixed(2)+' USDT a la dirección de escrow.</div></div>' +
          '<div class="step"><div class="step-num">3</div><div class="step-text"><strong>Confirmá</strong> el pago con el botón. Verificamos tu tx en la blockchain.</div></div>' +
          '<div class="step"><div class="step-num">4</div><div class="step-text"><strong>Recibís el código</strong> de la gift card en tu panel en minutos.</div></div>' +
        '</div>' +
      '</div>' +

    '</div>';

  // Render inicial de instrucciones
  renderInstructions('trc20', precio);
}

// ── SELECCIÓN DE RED ─────────────────────────────────────────────────────
function selectNet(net) {
  document.querySelectorAll('.crypto-method').forEach(function(el) { el.classList.remove('selected'); });
  document.querySelector('[data-net="'+net+'"]').classList.add('selected');
  var precio = CARD_DATA ? parseFloat(CARD_DATA.precio_venta) || 0 : 0;
  renderInstructions(net, precio);
}

function renderInstructions(net, precio) {
  var addr  = WALLETS[net];
  var isTrc = net === 'trc20';
  var label = isTrc ? 'TRC20 (TRON)' : 'BEP20 (BNB Chain)';
  var cls   = isTrc ? 'trc' : 'bep';
  var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=' + encodeURIComponent(addr);

  document.getElementById('pagoInstructions').innerHTML =
    '<span class="network-badge '+cls+'">● Red '+label+'</span>' +

    '<div class="amount-box">' +
      '<span style="color:var(--gris);font-size:12px">Monto exacto a enviar</span>' +
      '<span class="amount-val">$'+precio.toFixed(2)+' USDT</span>' +
    '</div>' +

    '<div class="qr-box">' +
      '<img src="'+qrUrl+'" width="180" height="180" alt="QR">' +
      '<div class="qr-label">Escaneá con tu wallet · Red '+label+'</div>' +
    '</div>' +

    '<div class="addr-wrapper">' +
      '<div class="addr-box" id="addrText">'+addr+'</div>' +
      '<button class="copy-btn" id="copyBtn" onclick="copyAddr(\''+addr+'\')" title="Copiar">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>' +
      '</button>' +
    '</div>' +

    '<div class="warning-box">⚠️ <strong>Importante:</strong> Enviá <strong>solo USDT por red '+label+'</strong>. Si enviás por otra red o en otra moneda el pago se perderá. Enviá exactamente el monto indicado.</div>';
}

// ── COPIAR DIRECCIÓN ─────────────────────────────────────────────────────
function copyAddr(addr) {
  var btn = document.getElementById('copyBtn');
  var ok = function() {
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(function() {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    }, 2000);
  };
  if (navigator.clipboard) {
    navigator.clipboard.writeText(addr).then(ok).catch(function() {
      var ta = document.createElement('textarea');
      ta.value = addr; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      ok();
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = addr; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    ok();
  }
}

// ── CONFIRMAR PAGO ────────────────────────────────────────────────────────
async function confirmarPago() {
  if (typeof sb === 'undefined') return;

  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');

  var sess = await sb.auth.getSession();
  if (!sess.data || !sess.data.session) {
    window.location.href = 'login.html?from=' + encodeURIComponent(window.location.href);
    return;
  }

  var btn = document.querySelector('.btn-confirm');
  btn.disabled = true;
  btn.textContent = 'Registrando...';

  var selEl  = document.querySelector('.crypto-method.selected');
  var red    = selEl ? selEl.dataset.net.toUpperCase() : 'TRC20';
  var precio = CARD_DATA ? parseFloat(CARD_DATA.precio_venta) || 0 : 0;
  var userId = sess.data.session.user.id;
  var txId   = null;

  // Intentar en transactions
  try {
    var ins = await sb.from('transactions').insert({
      gift_card_id:   id,
      buyer_id:       userId,
      seller_id:      CARD_DATA ? CARD_DATA.seller_id : null,
      monto:          precio,
      moneda:         'USDT',
      red:            red,
      estado:         'pendiente_pago',
      wallet_destino: WALLETS[red.toLowerCase()],
      created_at:     new Date().toISOString()
    }).select('id').single();
    if (ins.data) txId = ins.data.id;
  } catch(e) { console.warn('tx:', e); }

  // Fallback en orders
  if (!txId) {
    try {
      var ins2 = await sb.from('orders').insert({
        gift_card_id: id,
        buyer_id:     userId,
        monto:        precio,
        moneda:       'USDT',
        red:          red,
        estado:       'pendiente_pago',
        created_at:   new Date().toISOString()
      }).select('id').single();
      if (ins2.data) txId = ins2.data.id;
    } catch(e) { console.warn('orders:', e); }
  }

  // Decrementar stock en gift_cards
  try {
    // Primero leer cantidad actual
    var stockRes = await sb.from('gift_cards').select('cantidad').eq('id', id).single();
    var cantActual = stockRes.data && stockRes.data.cantidad != null ? parseInt(stockRes.data.cantidad) : 1;
    var nuevaCant  = Math.max(0, cantActual - 1);
    await sb.from('gift_cards').update({ cantidad: nuevaCant }).eq('id', id);
  } catch(e) { console.warn('stock decrement:', e); }

  // Guardar en localStorage para el timer de confirmacion.html
  var expiresAt = Date.now() + (10 * 60 * 1000); // 10 minutos
  try {
    localStorage.setItem('gl_pago_pending', JSON.stringify({
      giftId:    id,
      txId:      txId,
      red:       red,
      monto:     precio,
      expiresAt: expiresAt
    }));
  } catch(e) {}

  btn.textContent = '✓ Confirmado';

  var dest = 'confirmacion.html?id=' + encodeURIComponent(id);
  if (txId) dest += '&tx=' + encodeURIComponent(txId);
  dest += '&red=' + red + '&monto=' + precio + '&exp=' + expiresAt;

  setTimeout(function() { window.location.href = dest; }, 800);
}
</script>
