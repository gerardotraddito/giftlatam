<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña - GiftLatam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --negro: #080808; --gris-card: #161616; --gris-borde: #222; --blanco: #F0F0F0; --gris: #888; --verde: #00C853; --rojo: #FF4444; }
    body { font-family: 'Inter', sans-serif; background: var(--negro); color: var(--blanco); min-height: 100vh; display: flex; flex-direction: column; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 52px; border-bottom: 1px solid var(--gris-borde); background: rgba(8,8,8,0.97); }
    .logo { display: flex; align-items: center; gap: 7px; text-decoration: none; }
    .logo-icon { width: 32px; height: 32px; background: var(--verde); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: #F0F0F0; }
    .logo-text span { color: var(--verde); }
    .nav-link { color: var(--gris); font-size: 13px; text-decoration: none; }
    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
    .card { background: var(--gris-card); border: 1px solid var(--gris-borde); border-radius: 20px; padding: 32px 28px; width: 100%; max-width: 400px; }
    .card-icon { font-size: 40px; margin-bottom: 16px; display: block; text-align: center; }
    .card-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px; text-align: center; }
    .card-sub { font-size: 13px; color: var(--gris); margin-bottom: 28px; text-align: center; line-height: 1.6; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--gris); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    input { width: 100%; background: #111; border: 1px solid var(--gris-borde); border-radius: 10px; padding: 11px 14px; color: var(--blanco); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--verde); }
    input.error { border-color: var(--rojo); }
    .btn-submit { width: 100%; background: var(--verde); color: #000; border: none; border-radius: 12px; padding: 13px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; cursor: pointer; margin-top: 4px; transition: opacity 0.2s; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .back-link { display: block; text-align: center; margin-top: 18px; font-size: 13px; color: var(--gris); text-decoration: none; }
    .back-link:hover { color: var(--blanco); }
    .alert { border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: none; line-height: 1.5; }
    .alert.show { display: block; }
    .alert.success { background: rgba(0,200,83,0.1); border: 1px solid rgba(0,200,83,0.3); color: var(--verde); }
    .alert.danger { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: var(--rojo); }
    .success-state { text-align: center; display: none; }
    .success-state .big-icon { font-size: 56px; margin-bottom: 16px; display: block; }
    .success-state .title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 10px; }
    .success-state .desc { font-size: 13px; color: var(--gris); line-height: 1.7; margin-bottom: 24px; }
    .success-state .desc strong { color: var(--blanco); }
    .btn-back-login { display: inline-block; background: transparent; color: var(--verde); border: 1px solid var(--verde); border-radius: 12px; padding: 11px 24px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon">💎</div>
    <span class="logo-text">Gift<span>Latam</span></span>
  </a>
  <a href="login.html" class="nav-link">← Volver al login</a>
</nav>

<div class="page">
  <div class="card">

    <!-- Formulario -->
    <div id="formState">
      <span class="card-icon">🔑</span>
      <div class="card-title">Recuperar contraseña</div>
      <div class="card-sub">Ingresá tu email y te enviamos un link para crear una nueva contraseña.</div>

      <div class="alert danger" id="alertErr"></div>

      <div class="form-group">
        <label>Tu email</label>
        <input type="email" id="emailInput" placeholder="juan@email.com" autocomplete="email">
      </div>

      <button class="btn-submit" id="btnEnviar" onclick="enviarReset()">📧 Enviar link de recuperación</button>
      <a href="login.html" class="back-link">← Volver al login</a>
    </div>

    <!-- Éxito -->
    <div class="success-state" id="successState">
      <span class="big-icon">📬</span>
      <div class="title">¡Email enviado!</div>
      <div class="desc">
        Te enviamos un link a<br>
        <strong id="emailSent"></strong><br><br>
        Revisá tu bandeja de entrada y spam.<br>
        El link expira en <strong>1 hora</strong>.
      </div>
      <a href="login.html" class="btn-back-login">← Volver al login</a>
    </div>

  </div>
</div>

<script src="reset-password.js"></script>
</body>
</html>
