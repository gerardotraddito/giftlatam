<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GiftLatam - Detalle</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--negro:#080808;--oscuro:#111;--card:#161616;--borde:#222;--blanco:#F0F0F0;--gris:#888;--verde:#00C853;--naranja:#FF6B35}
    html,body{max-width:100%;overflow-x:hidden}
    body{font-family:'Inter',-apple-system,sans-serif;background:var(--negro);color:var(--blanco);padding-bottom:90px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* NAV */
    nav{display:flex;align-items:center;padding:0 14px;height:54px;border-bottom:1px solid var(--borde);position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.97);backdrop-filter:blur(16px);gap:8px}
    .logo{display:flex;align-items:center;gap:7px;text-decoration:none;flex-shrink:0}
    .logo-icon{width:32px;height:32px;background:var(--verde);border-radius:9px;display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:18px;height:18px}
    .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--blanco)}
    .logo-text .g{color:var(--verde)}
    .nav-spacer{flex:1}
    .nav-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .btn-login{display:none;background:transparent;color:var(--blanco);border:1px solid var(--borde);border-radius:9px;padding:7px 12px;font-size:13px;font-family:'Inter',sans-serif;cursor:pointer}
    .btn-vender{background:var(--verde);color:#000;border:none;border-radius:9px;padding:8px 14px;font-family:'Inter',sans-serif;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
    @media(min-width:480px){.btn-login{display:flex}}

    /* LAYOUT */
    .container{max-width:900px;margin:0 auto;padding:0 14px}
    .main{padding:16px 0 24px}
    .back-link{color:var(--gris);text-decoration:none;font-size:13px;display:inline-flex;align-items:center;gap:5px;margin-bottom:16px}
    .back-link:hover{color:var(--blanco)}
    .detail-grid{display:grid;grid-template-columns:1fr;gap:16px}
    @media(min-width:700px){.detail-grid{grid-template-columns:1fr 300px}}

    /* CARD PRINCIPAL */
    .detail-card{background:var(--card);border:1px solid var(--borde);border-radius:20px;overflow:hidden}

    /* Área de imagen */
    .detail-img-wrap{width:100%;aspect-ratio:16/7;min-height:150px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
    .detail-img-wrap img.cover{width:100%;height:100%;object-fit:cover;display:block}
    .detail-img-wrap img.logo-brand{width:80px;height:80px;object-fit:contain;display:block}
    .brand-emoji{font-size:72px;line-height:1}

    .detail-body{padding:20px}

    /* Badges */
    .detail-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
    .dbadge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;border:1px solid}
    .dbadge-tipo{color:var(--verde);background:rgba(0,200,83,0.1);border-color:rgba(0,200,83,0.2)}
    .dbadge-region{color:#aaa;background:rgba(255,255,255,0.05);border-color:var(--borde)}
    .dbadge-pct{color:#000;background:#ffdd00;border-color:#ffdd00}

    .detail-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1.3;margin-bottom:6px}
    .detail-marca{font-size:13px;color:var(--gris);margin-bottom:18px}

    /* Precio */
    .detail-price{font-family:'Inter',sans-serif;font-size:34px;font-weight:800;color:var(--verde);font-variant-numeric:tabular-nums;line-height:1;display:block;margin-bottom:4px}
    .detail-price-old{font-size:14px;color:var(--gris);text-decoration:line-through;font-variant-numeric:tabular-nums;margin-bottom:18px;display:block}

    /* Descripción */
    .detail-desc{font-size:13px;color:#bbb;line-height:1.7;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--borde)}

    /* Info tabla */
    .info-table{width:100%;border-collapse:collapse;margin-bottom:20px}
    .info-table tr{border-bottom:1px solid var(--borde)}
    .info-table tr:last-child{border:none}
    .info-table td{padding:10px 0;font-size:13px}
    .info-table td:first-child{color:var(--gris)}
    .info-table td:last-child{font-weight:600;text-align:right}

    /* Botones */
    .btn-comprar{background:var(--verde);color:#000;border:none;border-radius:14px;padding:15px;font-family:'Syne',sans-serif;font-weight:800;font-size:16px;cursor:pointer;width:100%;margin-bottom:8px;transition:opacity 0.15s}
    .btn-comprar:hover{opacity:0.9}
    .btn-wishlist{background:transparent;color:var(--blanco);border:1px solid var(--borde);border-radius:14px;padding:12px;font-family:'Inter',sans-serif;font-size:14px;cursor:pointer;width:100%;transition:border-color 0.15s}
    .btn-wishlist:hover{border-color:var(--verde);color:var(--verde)}

    /* SIDEBAR */
    .seller-card{background:var(--card);border:1px solid var(--borde);border-radius:16px;padding:16px;margin-bottom:12px}
    .seller-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
    .seller-avatar{width:46px;height:46px;border-radius:50%;background:rgba(0,200,83,0.15);border:1px solid rgba(0,200,83,0.2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .seller-name{font-weight:700;font-size:14px;margin-bottom:2px}
    .seller-sub{font-size:12px;color:var(--gris)}
    .verified{background:rgba(0,200,83,0.1);color:var(--verde);border:1px solid rgba(0,200,83,0.25);border-radius:5px;padding:2px 6px;font-size:10px;font-weight:700;margin-left:4px}
    .stat-row{display:flex;justify-content:space-between;font-size:12px;padding:7px 0;border-bottom:1px solid var(--borde)}
    .stat-row:last-child{border:none;padding-bottom:0}
    .stat-row span:last-child{font-weight:600}

    /* Relacionados */
    .sec-label{font-size:11px;font-weight:700;color:var(--gris);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px}
    .rel-card{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--borde);border-radius:12px;padding:10px 12px;margin-bottom:8px;text-decoration:none;color:inherit;transition:border-color 0.15s}
    .rel-card:hover{border-color:rgba(0,200,83,0.4)}
    .rel-icon{width:40px;height:40px;min-width:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
    .rel-icon img{width:26px;height:26px;object-fit:contain}
    .rel-info{flex:1;min-width:0}
    .rel-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rel-marca{font-size:11px;color:var(--gris)}
    .rel-price{font-size:13px;font-weight:800;color:var(--verde);flex-shrink:0;font-variant-numeric:tabular-nums}

    /* Spinner / error */
    .spinner{width:28px;height:28px;border:3px solid #333;border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;margin:44px auto}
    .error-block{text-align:center;padding:44px 20px;color:var(--gris);line-height:1.8}

    /* BOTTOM NAV */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(14,14,14,0.97);border-top:1px solid var(--borde);display:flex;justify-content:space-around;align-items:center;padding:8px 0 14px;z-index:9999;backdrop-filter:blur(20px)}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--gris);font-size:10px;padding:2px 8px}
    .nav-item.active{color:var(--verde)}
    .nav-item svg{width:21px;height:21px}
    @media(min-width:1024px){.bottom-nav{display:none}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 44 44" fill="none"><rect width="44" height="44" rx="11" fill="#00C853"/><polygon points="22,10 32,22 22,34 12,22" fill="#003D1A" opacity="0.6"/><polygon points="22,10 32,22 22,34 12,22" fill="#00FF6E" opacity="0.85" transform="scale(0.6) translate(14.7,14.7)"/></svg></div>
    <span class="logo-text">Gift<span class="g">Latam</span></span>
  </a>
  <div class="nav-spacer"></div>
  <div class="nav-actions" id="navActions">
    <button class="btn-login" onclick="location.href='login.html'">Iniciar sesión</button>
    <button class="btn-vender" onclick="location.href='publicar.html'">+ Vender</button>
  </div>
</nav>

<div class="container">
  <div class="main">
    <a href="explorar.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Volver al catálogo
    </a>
    <div class="detail-grid">
      <div>
        <div class="detail-card" id="detailCard"><div class="spinner"></div></div>
      </div>
      <div>
        <div class="seller-card" id="sellerCard" style="display:none"></div>
        <div id="relWrap" style="display:none">
          <div class="sec-label">Más productos</div>
          <div id="relList"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="location.href='index.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</div>
  <div class="nav-item active" onclick="location.href='explorar.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Explorar</div>
  <div class="nav-item" onclick="location.href='publicar.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Vender</div>
  <div class="nav-item" onclick="location.href='explorar.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>Ofertas</div>
  <div class="nav-item" onclick="location.href='panel.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil</div>
</div>

<script>
// ── Datos de marcas ─────────────────────────────────────────────────────────
var LOGOS = {
  xbox:'https://cdn.simpleicons.org/xbox/107C10',
  playstation:'https://cdn.simpleicons.org/playstation/003791',
  psn:'https://cdn.simpleicons.org/playstation/003791',
  steam:'https://cdn.simpleicons.org/steam/66c0f4',
  apple:'https://cdn.simpleicons.org/apple/f5f5f7',
  spotify:'https://cdn.simpleicons.org/spotify/1ED760',
  netflix:'https://cdn.simpleicons.org/netflix/E50914',
  nintendo:'https://cdn.simpleicons.org/nintendo/E60012',
  roblox:'https://cdn.simpleicons.org/roblox/E2231A',
  youtube:'https://cdn.simpleicons.org/youtube/FF0000',
  amazon:'https://cdn.simpleicons.org/amazon/FF9900',
  discord:'https://cdn.simpleicons.org/discord/5865F2',
  twitch:'https://cdn.simpleicons.org/twitch/9146FF',
};
var BG = {
  steam:'rgba(102,192,244,0.12)',xbox:'rgba(16,124,16,0.15)',
  playstation:'rgba(0,55,145,0.15)',psn:'rgba(0,55,145,0.15)',
  spotify:'rgba(30,215,96,0.15)',netflix:'rgba(229,9,20,0.15)',
  apple:'rgba(255,255,255,0.07)',nintendo:'rgba(230,0,18,0.15)',
  roblox:'rgba(226,35,26,0.15)',youtube:'rgba(255,0,0,0.15)',
  amazon:'rgba(255,153,0,0.15)',discord:'rgba(88,101,242,0.15)',
  twitch:'rgba(145,70,255,0.15)',
};
var EMOJI = {
  steam:'🎮',xbox:'🎮',playstation:'🎮',psn:'🎮',nintendo:'🎮',
  spotify:'🎵',netflix:'🎬',youtube:'📺',amazon:'🛒',apple:'🍎',
  discord:'💬',twitch:'📡',roblox:'🎮',
};
function bkey(m){ return (m||'').toLowerCase().trim().split(/[\s-]/)[0]; }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Render del producto ─────────────────────────────────────────────────────
function renderProduct(c) {
  var precio  = parseFloat(c.precio_venta  || 0);
  var nominal = parseFloat(c.valor_nominal || 0);
  var pct     = (nominal > 0 && precio < nominal) ? Math.round((1 - precio/nominal)*100) : 0;
  var k       = bkey(c.marca);
  var bg      = BG[k]    || 'rgba(0,200,83,0.08)';
  var emoji   = EMOJI[k] || '🎁';
  var logo    = LOGOS[k];

  // Imagen hero: foto vendedor > logo marca > emoji
  var imgHtml;
  if (c.imagen_url) {
    imgHtml = '<img class="cover" src="' + esc(c.imagen_url) + '" alt="' + esc(c.titulo||'') + '" '
            + 'onerror="this.onerror=null;this.parentElement.innerHTML=\'<span class=&quot;brand-emoji&quot;>' + emoji + '</span>\'">';
  } else if (logo) {
    imgHtml = '<img class="logo-brand" src="' + logo + '" alt="' + esc(c.marca||'') + '" '
            + 'onerror="this.onerror=null;this.parentElement.innerHTML=\'<span class=&quot;brand-emoji&quot;>' + emoji + '</span>\'">';
  } else {
    imgHtml = '<span class="brand-emoji">' + emoji + '</span>';
  }

  var TIPO    = {gift_card:'Gift Card Digital',cuenta:'Cuenta de usuario',licencia:'Licencia / Key',otro:'Otro digital'};
  var ENTREGA = {auto:'⚡ Automática',automatica:'⚡ Automática',manual:'✋ Manual (máx. 30 min)'};
  var entVal  = c.metodo_entrega || c.entrega || '';
  var entTxt  = ENTREGA[entVal] || entVal || 'A confirmar';
  var tipoTxt = TIPO[c.tipo]    || c.tipo  || 'Digital';
  var region  = c.region || 'Global';
  var cantidad = (c.cantidad != null) ? parseInt(c.cantidad) : null;
  var stockHtml = cantidad !== null
    ? (cantidad <= 3
        ? '<span style="display:inline-block;background:rgba(255,107,53,0.12);border:1px solid rgba(255,107,53,0.3);color:#ff6b35;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:700;margin-bottom:14px">⚡ Solo quedan ' + cantidad + ' unidad' + (cantidad !== 1 ? 'es' : '') + '</span>'
        : '<span style="display:inline-block;background:rgba(0,200,83,0.08);border:1px solid rgba(0,200,83,0.2);color:var(--verde);border-radius:8px;padding:3px 10px;font-size:12px;font-weight:600;margin-bottom:14px">✓ ' + cantidad + ' en stock</span>')
    : '';
  var desc    = c.descripcion || 'Gift card digital. El código se entrega tras confirmar el pago vía escrow.';

  document.getElementById('detailCard').innerHTML =
    '<div class="detail-img-wrap" style="background:' + bg + '">' + imgHtml + '</div>' +
    '<div class="detail-body">' +
      '<div class="detail-badges">' +
        '<span class="dbadge dbadge-tipo">' + esc(tipoTxt) + '</span>' +
        '<span class="dbadge dbadge-region">🌎 ' + esc(region) + '</span>' +
        (pct > 0 ? '<span class="dbadge dbadge-pct">-' + pct + '%</span>' : '') +
      '</div>' +
      '<div class="detail-title">' + esc(c.titulo || 'Sin título') + '</div>' +
      '<div class="detail-marca">' + esc(c.marca||'') + ' · Vendido por <strong id="vendNombre">@cargando...</strong></div>' +
      stockHtml +
      '<span class="detail-price">$' + precio.toFixed(2) + ' USDT</span>' +
      (nominal > 0 ? '<span class="detail-price-old">Valor nominal: $' + nominal.toFixed(2) + ' USD</span>' : '') +
      '<p class="detail-desc">' + esc(desc) + '</p>' +
      '<table class="info-table">' +
        '<tr><td>Marca</td><td>' + esc(c.marca||'—') + '</td></tr>' +
        '<tr><td>Región</td><td>' + esc(region) + '</td></tr>' +
        (cantidad !== null ? '<tr><td>Stock</td><td>' + cantidad + ' unidad' + (cantidad !== 1 ? 'es' : '') + '</td></tr>' : '') +
        '<tr><td>Entrega</td><td>' + esc(entTxt) + '</td></tr>' +
        '<tr><td>Pago</td><td>USDT · BTC · ETH</td></tr>' +
        '<tr><td>Protección</td><td>Escrow incluido ✓</td></tr>' +
      '</table>' +
      (cantidad === 0
        ? '<button class="btn-comprar" disabled style="opacity:0.4;cursor:not-allowed;background:#333;color:#888">😔 Sin stock</button>'
        : '<button class="btn-comprar" id="btnComprar" onclick="irAPago()">🔒 Comprar por $' + precio.toFixed(2) + ' USDT</button>') +
      '<button class="btn-wishlist" id="btnWish" onclick="guardarFav(\'' + c.id + '\')">♡ Guardar en favoritos</button>' +
    '</div>';

  window._card = c;
}

async function irAPago() {
  var c = window._card;
  if (!c) return;

  // Bloquear doble-click
  var btn = document.getElementById('btnComprar');
  if (btn) { btn.disabled = true; btn.textContent = 'Iniciando...'; }

  var WALLETS = {
    trc20: 'TXnbM7ZGpRZbhCBCm7UwJZWcRMbB5L9Kzt',
    bep20: '0x4A7bF2D8eC6E1F3a9b5D0C2E8F1A6B3C7D4E9F2A'
  };

  // Obtener email del usuario si está logueado
  var email = '';
  try {
    var sess = await sb.auth.getSession();
    if (sess.data && sess.data.session) {
      email = sess.data.session.user.email || '';
    }
  } catch(e) {}

  // Crear orden inmediatamente
  try {
    var ins = await sb.from('ordenes').insert({
      gift_card_id:   c.id,
      seller_id:      c.seller_id || null,
      comprador_email: email,
      precio:         parseFloat(c.precio_venta) || 0,
      moneda:         'USDT',
      red:            'TRC20',
      wallet_destino: WALLETS.trc20,
      estado:         'pendiente_pago',
      codigo_entrega: null
    }).select('id').single();

    if (ins.error || !ins.data) {
      console.error('[comprar] insert error:', ins.error);
      // Aunque falle el insert, mandamos igual con los datos en URL
      location.href = 'pago.html?gift_id=' + c.id
        + '&precio=' + c.precio_venta
        + '&titulo=' + encodeURIComponent(c.titulo||'');
      return;
    }

    var ordenId = ins.data.id;
    location.href = 'pago.html?orden_id=' + ordenId;

  } catch(e) {
    console.error('[comprar] catch:', e);
    location.href = 'pago.html?gift_id=' + c.id
      + '&precio=' + c.precio_venta
      + '&titulo=' + encodeURIComponent(c.titulo||'');
  }
}

// ── Vendedor ────────────────────────────────────────────────────────────────
async function loadSeller(sid) {
  if (!sid) return;
  try {
    var r = await sb.from('profiles').select('usuario,nombre,email,reputacion,ventas_totales,created_at').eq('id', sid).single();
    if (r.error) console.warn('[loadSeller] error:', r.error.message);
    var p = r.data || {};
    var nombre = p.usuario || p.nombre || (p.email ? p.email.split('@')[0] : null) || 'usuario';
    var since  = p.created_at ? new Date(p.created_at).getFullYear() : '2025';
    var rep    = p.reputacion   ? parseFloat(p.reputacion).toFixed(1)  : '5.0';
    var ventas = p.ventas_totales || 0;

    var vn = document.getElementById('vendNombre');
    if (vn) vn.innerHTML = '@' + esc(nombre) + ' <span class="verified">✓</span>';

    var sc = document.getElementById('sellerCard');
    sc.style.display = 'block';
    sc.innerHTML =
      '<div class="seller-top">' +
        '<div class="seller-avatar">😊</div>' +
        '<div>' +
          '<div class="seller-name">@' + esc(nombre) + '<span class="verified">✓</span></div>' +
          '<div class="seller-sub">⭐ ' + rep + ' · ' + ventas + ' ventas</div>' +
        '</div>' +
      '</div>' +
      '<div class="stat-row"><span>Miembro desde</span><span>' + since + '</span></div>' +
      '<div class="stat-row"><span>Reputación</span><span>⭐ ' + rep + '</span></div>' +
      '<div class="stat-row"><span>Ventas</span><span>' + ventas + '</span></div>';
  } catch(e){ console.warn('seller:', e); }
}

// ── Relacionados ────────────────────────────────────────────────────────────
async function loadRel(cid) {
  try {
    var r = await sb.from('gift_cards').select('id,titulo,marca,precio_venta,tipo').eq('estado','activo').neq('id',cid).limit(4);
    var data = r.data || [];
    if (!data.length) return;
    document.getElementById('relWrap').style.display = 'block';
    document.getElementById('relList').innerHTML = data.map(function(c) {
      var k   = bkey(c.marca);
      var bg  = BG[k] || 'rgba(0,200,83,0.08)';
      var ico = LOGOS[k]
        ? '<img src="' + LOGOS[k] + '" width="26" height="26" style="object-fit:contain" onerror="this.parentElement.innerHTML=\'' + (EMOJI[k]||'🎁') + '\'">'
        : (EMOJI[k]||'🎁');
      var p = parseFloat(c.precio_venta||0);
      return '<a href="detalle.html?id=' + c.id + '" class="rel-card">' +
        '<div class="rel-icon" style="background:' + bg + '">' + ico + '</div>' +
        '<div class="rel-info"><div class="rel-title">' + esc(c.titulo||'') + '</div><div class="rel-marca">' + esc(c.marca||'') + '</div></div>' +
        '<div class="rel-price">$' + p.toFixed(2) + '</div>' +
      '</a>';
    }).join('');
  } catch(e){ console.warn('rel:', e); }
}

// ── Favorito ────────────────────────────────────────────────────────────────
async function guardarFav(id) {
  var btn = document.getElementById('btnWish'); if (!btn) return;
  try {
    var r = await sb.auth.getSession();
    if (!r.data || !r.data.session) {
      btn.textContent = '→ Iniciá sesión para guardar';
      setTimeout(function(){ location.href='login.html'; }, 1400);
    } else {
      btn.textContent = '♥ Guardado en favoritos';
      btn.style.color = 'var(--verde)';
      btn.style.borderColor = 'var(--verde)';
    }
  } catch(e){ console.warn('fav:', e); }
}

// ── Mostrar error ───────────────────────────────────────────────────────────
function showError(msg) {
  document.getElementById('detailCard').innerHTML =
    '<div class="error-block">' +
      '<div style="font-size:40px;margin-bottom:14px">😕</div>' +
      '<div style="color:var(--blanco);font-weight:700;margin-bottom:8px">No encontramos este producto</div>' +
      '<div style="font-size:13px">' + msg + '</div>' +
      '<a href="explorar.html" style="display:inline-block;margin-top:18px;color:var(--verde);text-decoration:none;font-weight:600">← Ver otros productos</a>' +
    '</div>';
}

// ── Init ────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async function() {
  // Esperar hasta que sb esté disponible (supabase.js usa IIFE)
  for (var i = 0; i < 30 && typeof sb === 'undefined'; i++) {
    await new Promise(function(r){ setTimeout(r, 50); });
  }
  if (typeof sb === 'undefined') { showError('No se pudo conectar con Supabase. Recargá la página.'); return; }

  var id = new URLSearchParams(window.location.search).get('id');
  if (!id) { showError('No se especificó qué producto mostrar.'); return; }

  try {
    var res = await sb.from('gift_cards').select('*').eq('id', id).single();
    if (res.error) { showError('Error ' + res.error.code + ': ' + res.error.message); return; }
    if (!res.data)  { showError('Producto no encontrado o ya fue vendido.'); return; }
    renderProduct(res.data);
    loadSeller(res.data.seller_id);
    loadRel(res.data.id);
  } catch(e) {
    console.error(e);
    showError('Error inesperado. Intentá recargar.');
  }
});
</script>
