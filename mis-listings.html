<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis publicaciones - GiftLatam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--negro:#080808;--card:#161616;--borde:#222;--blanco:#F0F0F0;--gris:#888;--verde:#00C853;--naranja:#FF6B35;--rojo:#FF4444}
    body{font-family:'Inter',sans-serif;background:var(--negro);color:var(--blanco);padding-bottom:90px;min-height:100vh}
    nav{display:flex;align-items:center;padding:0 14px;height:52px;border-bottom:1px solid var(--borde);position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.97);backdrop-filter:blur(16px);gap:12px}
    .back-btn{display:flex;align-items:center;gap:6px;color:var(--gris);font-size:13px;cursor:pointer;text-decoration:none;flex-shrink:0}
    .back-btn:hover{color:var(--blanco)}
    .nav-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;flex:1;text-align:center}
    .container{padding:16px 14px;max-width:600px;margin:0 auto}

    /* Tabs estado */
    .tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
    .tabs::-webkit-scrollbar{display:none}
    .tab{border:1px solid var(--borde);color:var(--gris);border-radius:20px;padding:6px 14px;font-size:12px;white-space:nowrap;cursor:pointer;background:transparent;font-family:'Inter',sans-serif;flex-shrink:0;transition:all 0.2s}
    .tab.active{border-color:var(--verde);color:var(--negro);background:var(--verde);font-weight:700}

    /* Card de listing */
    .listing-card{background:var(--card);border:1px solid var(--borde);border-radius:16px;padding:14px 16px;margin-bottom:10px;transition:border-color 0.2s}
    .listing-card:hover{border-color:rgba(0,200,83,0.3)}
    .listing-top{display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .listing-icon{width:44px;height:44px;border-radius:10px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .listing-info{flex:1;min-width:0}
    .listing-title{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
    .listing-meta{font-size:11px;color:var(--gris)}
    .listing-price{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:'tnum';font-size:16px;font-weight:800;color:var(--verde);flex-shrink:0}
    .estado-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
    .estado-activo{background:rgba(0,200,83,0.12);color:var(--verde);border:1px solid rgba(0,200,83,0.25)}
    .estado-vendido{background:rgba(136,136,136,0.12);color:var(--gris);border:1px solid #333}
    .estado-pausado{background:rgba(255,107,53,0.12);color:var(--naranja);border:1px solid rgba(255,107,53,0.25)}
    .listing-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--borde)}
    .action-btn{flex:1;padding:8px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;border:none;transition:opacity 0.2s}
    .action-btn:hover{opacity:0.8}
    .btn-editar{background:#1a1a1a;color:var(--blanco);border:1px solid var(--borde)!important}
    .btn-pausar{background:rgba(255,107,53,0.1);color:var(--naranja);border:1px solid rgba(255,107,53,0.2)!important}
    .btn-reactivar{background:rgba(0,200,83,0.1);color:var(--verde);border:1px solid rgba(0,200,83,0.2)!important}
    .btn-eliminar{background:rgba(255,68,68,0.1);color:var(--rojo);border:1px solid rgba(255,68,68,0.2)!important}

    /* Stats row */
    .stats-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
    .stat-mini{background:var(--card);border:1px solid var(--borde);border-radius:12px;padding:12px;text-align:center}
    .stat-mini-num{font-family:'Inter',sans-serif;font-variant-numeric:tabular-nums;font-feature-settings:'tnum';font-size:20px;font-weight:800;color:var(--verde);display:block;line-height:1}
    .stat-mini-label{font-size:10px;color:var(--gris);display:block;margin-top:4px}

    /* Publish CTA */
    .publish-cta{background:linear-gradient(135deg,#003D1A,#001A0D);border:1px solid rgba(0,200,83,0.2);border-radius:16px;padding:20px;text-align:center;margin-bottom:20px}
    .publish-cta-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:6px}
    .publish-cta-sub{font-size:13px;color:#aaa;margin-bottom:14px}
    .btn-publish{display:inline-block;background:var(--verde);color:#000;border:none;border-radius:12px;padding:11px 22px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;text-decoration:none}

    /* Empty */
    .empty{text-align:center;padding:50px 20px;color:var(--gris)}
    .empty-emoji{font-size:44px;display:block;margin-bottom:14px}
    .empty-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--blanco);margin-bottom:8px}
    .empty-sub{font-size:13px;line-height:1.6;margin-bottom:20px}

    /* Loading */
    .loading{text-align:center;padding:50px 20px;color:var(--gris)}
    .spinner{width:28px;height:28px;border:3px solid #222;border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Modal confirmar */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal-box{background:#161616;border:1px solid #333;border-radius:20px;padding:26px;max-width:320px;width:100%}
    .modal-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;margin-bottom:8px}
    .modal-sub{font-size:13px;color:#888;line-height:1.6;margin-bottom:22px}
    .modal-btns{display:flex;gap:10px}
    .modal-cancel{flex:1;padding:11px;border-radius:12px;background:#222;color:var(--blanco);border:none;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
    .modal-confirm{flex:1;padding:11px;border-radius:12px;background:var(--rojo);color:#fff;border:none;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}

    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(14,14,14,0.97);border-top:1px solid var(--borde);display:flex;justify-content:space-around;align-items:center;padding:8px 0 14px;z-index:999;backdrop-filter:blur(20px)}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--gris);font-size:10px;padding:2px 8px}
    .nav-item.active{color:var(--verde)}
    .nav-item svg{width:21px;height:21px}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</head>
<body>

<nav>
  <a href="panel.html" class="back-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Mi panel
  </a>
  <div class="nav-title">Mis publicaciones</div>
  <a href="publicar.html" style="color:var(--verde);font-size:22px;text-decoration:none;flex-shrink:0">＋</a>
</nav>

<div class="container">

  <!-- Stats mini -->
  <div class="stats-mini" id="statsMini">
    <div class="stat-mini"><span class="stat-mini-num" id="cntActivo">-</span><span class="stat-mini-label">Activos</span></div>
    <div class="stat-mini"><span class="stat-mini-num" id="cntVendido">-</span><span class="stat-mini-label">Vendidos</span></div>
    <div class="stat-mini"><span class="stat-mini-num" id="cntPausado">-</span><span class="stat-mini-label">Pausados</span></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-filter="all"     onclick="setTab(this)">Todos</div>
    <div class="tab"        data-filter="activo"  onclick="setTab(this)">Activos</div>
    <div class="tab"        data-filter="vendido" onclick="setTab(this)">Vendidos</div>
    <div class="tab"        data-filter="pausado" onclick="setTab(this)">Pausados</div>
  </div>

  <div id="listingsContainer">
    <div class="loading"><div class="spinner"></div>Cargando tus publicaciones...</div>
  </div>

</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.location='index.html'"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>Inicio</div>
  <div class="nav-item" onclick="window.location='explorar.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Explorar</div>
  <div class="nav-item" onclick="window.location='publicar.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>Vender</div>
  <div class="nav-item" onclick="window.location='explorar.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>Ofertas</div>
  <div class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil</div>
</div>

<script>
var allListings = [];
var currentFilter = 'all';
var currentUserId = null;

var BRAND_ICONS = {
  steam:'🎮',xbox:'🎮',playstation:'🎮',psn:'🎮',nintendo:'🎮',roblox:'🎮',pubg:'🎮',valorant:'🎮',minecraft:'🎮',
  netflix:'🎬',spotify:'🎵',disney:'🎬',hbo:'🎬',amazon:'🛒',youtube:'📺',twitch:'📺',discord:'💬',
  apple:'🍎','google play':'📱'
};
function getIcon(marca) { return BRAND_ICONS[(marca||'').toLowerCase()] || '🎁'; }

document.addEventListener('DOMContentLoaded', async function() {
  var res = await sb.auth.getSession();
  if (!res.data || !res.data.session) {
    window.location.href = 'login.html';
    return;
  }
  currentUserId = res.data.session.user.id;
  loadListings();
});

async function loadListings() {
  var res = await sb
    .from('gift_cards')
    .select('*')
    .eq('seller_id', currentUserId)
    .order('created_at', { ascending: false });

  if (res.error) {
    document.getElementById('listingsContainer').innerHTML =
      '<div class="empty"><span class="empty-emoji">⚠️</span><div class="empty-title">Error al cargar</div><div class="empty-sub">' + res.error.message + '</div></div>';
    return;
  }

  allListings = res.data || [];

  // Contar por estado
  var cnt = { activo: 0, vendido: 0, pausado: 0 };
  allListings.forEach(function(l) { if (cnt[l.estado] !== undefined) cnt[l.estado]++; });
  document.getElementById('cntActivo').textContent  = cnt.activo;
  document.getElementById('cntVendido').textContent = cnt.vendido;
  document.getElementById('cntPausado').textContent = cnt.pausado;

  render();
}

function setTab(el) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  currentFilter = el.dataset.filter;
  render();
}

function render() {
  var filtered = currentFilter === 'all'
    ? allListings
    : allListings.filter(function(l){ return l.estado === currentFilter; });

  var container = document.getElementById('listingsContainer');

  if (allListings.length === 0) {
    container.innerHTML =
      '<div class="publish-cta">' +
        '<div class="publish-cta-title">Todavía no publicaste nada</div>' +
        '<div class="publish-cta-sub">Publicá tu primera gift card y empezá a vender en minutos.</div>' +
        '<a href="publicar.html" class="btn-publish">+ Publicar ahora</a>' +
      '</div>';
    return;
  }

  if (filtered.length === 0) {
    container.innerHTML =
      '<div class="empty"><span class="empty-emoji">📭</span>' +
      '<div class="empty-title">Sin publicaciones ' + currentFilter + 's</div>' +
      '<div class="empty-sub">No tenés gift cards en este estado.</div></div>';
    return;
  }

  container.innerHTML = filtered.map(function(l) {
    var precio   = parseFloat(l.precio_venta || 0).toFixed(2);
    var estadoCls = 'estado-' + (l.estado || 'activo');
    var estadoLabel = { activo:'● Activo', vendido:'✓ Vendido', pausado:'⏸ Pausado' }[l.estado] || l.estado;
    var icon = getIcon(l.marca);
    var fecha = l.created_at ? new Date(l.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'}) : '';

    var actionBtns = '';
    if (l.estado === 'activo') {
      actionBtns =
        '<button class="action-btn btn-editar"  onclick="editarListing(\'' + l.id + '\')">✏️ Editar</button>' +
        '<button class="action-btn btn-pausar"  onclick="cambiarEstado(\'' + l.id + '\',\'pausado\')">⏸ Pausar</button>' +
        '<button class="action-btn btn-eliminar" onclick="confirmarEliminar(\'' + l.id + '\',\'' + (l.titulo||'').replace(/'/g,"\\'") + '\')">🗑 Eliminar</button>';
    } else if (l.estado === 'pausado') {
      actionBtns =
        '<button class="action-btn btn-reactivar" onclick="cambiarEstado(\'' + l.id + '\',\'activo\')">▶ Reactivar</button>' +
        '<button class="action-btn btn-eliminar"  onclick="confirmarEliminar(\'' + l.id + '\',\'' + (l.titulo||'').replace(/'/g,"\\'") + '\')">🗑 Eliminar</button>';
    } else if (l.estado === 'vendido') {
      actionBtns = '<button class="action-btn btn-editar" style="opacity:0.5" disabled>✓ Vendido</button>';
    }

    return '<div class="listing-card">' +
      '<div class="listing-top">' +
        '<div class="listing-icon">' + icon + '</div>' +
        '<div class="listing-info">' +
          '<div class="listing-title">' + (l.titulo || 'Sin título') + '</div>' +
          '<div class="listing-meta">' + (l.marca || '') + ' · ' + fecha + '</div>' +
        '</div>' +
        '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">' +
          '<span class="listing-price">$' + precio + ' USDT</span>' +
          '<span class="estado-badge ' + estadoCls + '">' + estadoLabel + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="listing-actions">' + actionBtns + '</div>' +
    '</div>';
  }).join('');
}

async function cambiarEstado(id, nuevoEstado) {
  var res = await sb.from('gift_cards').update({ estado: nuevoEstado }).eq('id', id);
  if (!res.error) {
    var l = allListings.find(function(x){ return x.id === id; });
    if (l) {
      // actualizar contador
      var old = l.estado;
      var cnt = {};
      cnt[old] = parseInt(document.getElementById('cnt' + old.charAt(0).toUpperCase() + old.slice(1)).textContent || 0) - 1;
      cnt[nuevoEstado] = parseInt(document.getElementById('cnt' + nuevoEstado.charAt(0).toUpperCase() + nuevoEstado.slice(1)).textContent || 0) + 1;
      Object.keys(cnt).forEach(function(k){
        var el = document.getElementById('cnt' + k.charAt(0).toUpperCase() + k.slice(1));
        if (el) el.textContent = Math.max(0, cnt[k]);
      });
      l.estado = nuevoEstado;
      render();
    }
  }
}

function confirmarEliminar(id, titulo) {
  var modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.innerHTML =
    '<div class="modal-box">' +
      '<div class="modal-title">¿Eliminar publicación?</div>' +
      '<div class="modal-sub">Vas a eliminar "' + titulo + '". Esta acción no se puede deshacer.</div>' +
      '<div class="modal-btns">' +
        '<button class="modal-cancel" onclick="this.closest(\'.modal-overlay\').remove()">Cancelar</button>' +
        '<button class="modal-confirm" onclick="eliminarListing(\'' + id + '\',this)">Eliminar</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(modal);
}

async function eliminarListing(id, btn) {
  btn.textContent = '...';
  btn.disabled = true;
  var res = await sb.from('gift_cards').delete().eq('id', id);
  if (!res.error) {
    allListings = allListings.filter(function(l){ return l.id !== id; });
    document.querySelector('.modal-overlay').remove();
    render();
  }
}

function editarListing(id) {
  window.location.href = 'publicar.html?editar=' + id;
}
</script>
</body>
</html>
