<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Disputas - GiftLatam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--negro:#080808;--card:#161616;--borde:#222;--blanco:#F0F0F0;--gris:#888;--verde:#00C853;--naranja:#FF6B35;--rojo:#FF4444;--azul:#3B82F6}
    body{font-family:'Inter',sans-serif;background:var(--negro);color:var(--blanco);padding-bottom:90px;min-height:100vh}

    /* NAV */
    nav{display:flex;align-items:center;padding:0 12px;height:54px;border-bottom:1px solid var(--borde);position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.97);backdrop-filter:blur(16px);gap:8px}
    .logo{display:flex;align-items:center;gap:7px;text-decoration:none}
    .logo-icon{width:32px;height:32px;background:var(--verde);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--blanco)}
    .logo-text .g{color:var(--verde)}
    .nav-spacer{flex:1}
    .btn-vender{background:var(--verde);color:#000;border:none;border-radius:9px;padding:8px 14px;font-family:'Inter',sans-serif;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;text-decoration:none}

    .container{max-width:600px;margin:0 auto;padding:20px 14px}

    /* Tabs */
    .tabs{display:flex;gap:4px;background:var(--card);border:1px solid var(--borde);border-radius:14px;padding:4px;margin-bottom:20px}
    .tab{flex:1;text-align:center;padding:9px 6px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:500;transition:all 0.15s;color:var(--gris)}
    .tab.active{background:var(--verde);color:#000;font-weight:700}

    /* Paneles */
    .panel{display:none}
    .panel.active{display:block}

    /* Dispute card */
    .dispute-card{background:var(--card);border:1px solid var(--borde);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s}
    .dispute-card:hover{border-color:rgba(0,200,83,0.3)}
    .d-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:10px}
    .d-product{font-size:14px;font-weight:700}
    .d-date{font-size:11px;color:var(--gris);margin-top:2px}
    .d-desc{font-size:12px;color:var(--gris);line-height:1.5;margin-top:4px}
    .d-status{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;flex-shrink:0}
    .st-abierto{background:rgba(255,107,53,0.1);color:var(--naranja)}
    .st-revision{background:rgba(59,130,246,0.1);color:var(--azul)}
    .st-resuelto{background:rgba(0,200,83,0.1);color:var(--verde)}
    .st-cerrado{background:rgba(136,136,136,0.1);color:var(--gris)}

    /* Empty */
    .empty{text-align:center;padding:50px 20px;color:var(--gris)}
    .empty-emoji{font-size:44px;display:block;margin-bottom:14px}
    .empty-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--blanco);margin-bottom:8px}
    .empty-sub{font-size:13px;line-height:1.6}

    /* Formulario abrir disputa */
    .field{background:var(--card);border:1px solid var(--borde);border-radius:14px;overflow:hidden;margin-bottom:10px;transition:border-color 0.2s}
    .field:focus-within{border-color:rgba(0,200,83,0.5)}
    .field-label{font-size:11px;font-weight:600;color:var(--gris);padding:10px 14px 0;display:block}
    .field input,.field textarea,.field select{width:100%;background:transparent;border:none;outline:none;color:var(--blanco);font-family:'Inter',sans-serif;font-size:14px;padding:6px 14px 12px;resize:none}
    .field textarea{min-height:90px;line-height:1.5}
    .field select{cursor:pointer;-webkit-appearance:none;appearance:none}
    .field select option{background:#1a1a1a}
    .btn-submit{width:100%;background:var(--verde);color:#000;border:none;border-radius:14px;padding:14px;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;cursor:pointer;margin-top:4px}
    .btn-submit:disabled{opacity:0.4;cursor:not-allowed}

    /* FAQ */
    .faq-item{background:var(--card);border:1px solid var(--borde);border-radius:14px;margin-bottom:8px;overflow:hidden}
    .faq-q{padding:14px 16px;font-size:14px;font-weight:600;cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
    .faq-q .arrow{transition:transform 0.2s;font-size:16px;color:var(--gris)}
    .faq-item.open .arrow{transform:rotate(180deg)}
    .faq-a{padding:0 16px;max-height:0;overflow:hidden;transition:all 0.2s;font-size:13px;color:var(--gris);line-height:1.6}
    .faq-item.open .faq-a{padding:0 16px 14px;max-height:300px}

    /* Spinner */
    .spinner{width:26px;height:26px;border:3px solid #222;border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;margin:30px auto}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Toast */
    .toast{position:fixed;top:66px;left:50%;transform:translateX(-50%) translateY(-16px);background:#1a1a1a;border:1px solid var(--verde);color:var(--verde);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* Bottom nav */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(14,14,14,0.97);border-top:1px solid var(--borde);display:flex;justify-content:space-around;align-items:center;padding:8px 0 14px;z-index:9999;backdrop-filter:blur(20px)}
    .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--gris);font-size:10px;padding:2px 8px}
    .nav-item.active{color:var(--verde)}
    .nav-item svg{width:21px;height:21px}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
</head>
<body>

<div class="toast" id="toast"></div>

<nav>
  <a href="index.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 44 44" fill="none"><rect width="44" height="44" rx="11" fill="#00C853"/><polygon points="22,10 32,22 22,34 12,22" fill="#003D1A" opacity="0.6"/><polygon points="22,10 32,22 22,34 12,22" fill="#00FF6E" opacity="0.85" transform="scale(0.6) translate(14.7,14.7)"/></svg></div>
    <span class="logo-text">Gift<span class="g">Latam</span></span>
  </a>
  <div class="nav-spacer"></div>
  <a href="publicar.html" class="btn-vender">+ Vender</a>
</nav>

<div class="container">
  <div style="font-size:22px;font-weight:800;margin-bottom:4px">⚖️ Centro de disputas</div>
  <div style="font-size:13px;color:var(--gris);margin-bottom:20px">Resolvemos cualquier problema con tu compra</div>

  <div class="tabs">
    <div class="tab active" onclick="setTab('mis')">Mis disputas</div>
    <div class="tab" onclick="setTab('abrir')">Abrir disputa</div>
    <div class="tab" onclick="setTab('faq')">FAQ</div>
  </div>

  <!-- PANEL: MIS DISPUTAS -->
  <div class="panel active" id="panel-mis">
    <div id="disputasList"><div class="spinner"></div></div>
  </div>

  <!-- PANEL: ABRIR DISPUTA -->
  <div class="panel" id="panel-abrir">
    <div class="field">
      <span class="field-label">NÚMERO DE ORDEN *</span>
      <input type="number" id="fTx" placeholder="Ej: 000123" min="1" style="letter-spacing:1px">
    </div>
    <div class="field">
      <span class="field-label">MOTIVO *</span>
      <select id="fMotivo">
        <option value="">Seleccioná el motivo...</option>
        <option value="codigo_invalido">El código no funciona</option>
        <option value="no_entregado">El vendedor no entregó el código</option>
        <option value="demora">El vendedor demoró más de lo acordado</option>
        <option value="producto_incorrecto">El producto no es lo que se anunció</option>
        <option value="otro">Otro motivo</option>
      </select>
    </div>
    <div class="field">
      <span class="field-label">DESCRIPCIÓN DEL PROBLEMA *</span>
      <textarea id="fDesc" placeholder="Describí en detalle qué pasó, cuándo y qué pasos ya intentaste..."></textarea>
    </div>
    <button class="btn-submit" id="btnSubmit" onclick="abrirDisputa()">Abrir disputa</button>
    <div style="font-size:11px;color:var(--gris);text-align:center;margin-top:10px;line-height:1.6">
      El equipo de GiftLatam revisará tu caso en menos de 24 horas.<br>Te notificaremos por email con las novedades.
    </div>
  </div>

  <!-- PANEL: FAQ -->
  <div class="panel" id="panel-faq">
    <div id="faqList"></div>
  </div>
</div>

<div class="bottom-nav">
  
  <div class="nav-item" onclick="location.href='panel.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Perfil</div>
</div>

<script>
var currentTab = 'mis';
var currentUser = null;
var misTransacciones = [];

var ST_LABEL = { abierto:'Abierto', revision:'En revisión', resuelto:'Resuelto', cerrado:'Cerrado' };
var ST_CLS   = { abierto:'st-abierto', revision:'st-revision', resuelto:'st-resuelto', cerrado:'st-cerrado' };

var FAQ_ITEMS = [
  { q:'¿Cuánto tarda en resolverse una disputa?', a:'El equipo de GiftLatam revisa cada caso en menos de 24 horas. Las disputas simples (código inválido, no entregado) suelen resolverse en 24-48 hs. Casos más complejos pueden demorar hasta 5 días hábiles.' },
  { q:'¿Cuándo me devuelven el dinero?', a:'Si la disputa se resuelve a tu favor, el monto se acredita en tu wallet de GiftLatam en el mismo instante. Desde ahí podés retirarlo o usarlo en otra compra.' },
  { q:'¿Puedo abrir una disputa si ya pasaron varios días?', a:'Podés abrir una disputa hasta 7 días después de la transacción. Pasado ese plazo, la operación se considera completada automáticamente.' },
  { q:'¿Qué pasa con el vendedor si pierde la disputa?', a:'Si un vendedor acumula disputas perdidas, su cuenta queda suspendida preventivamente y se le notifica. Los fondos en escrow se liberan hacia el comprador.' },
  { q:'¿Puedo disputar si compré fuera de la plataforma?', a:'No. El sistema de escrow y protección de GiftLatam solo aplica a transacciones realizadas dentro de la plataforma. Nunca acuerdes pagos fuera del sitio.' },
];

document.addEventListener('DOMContentLoaded', async function() {
  var res = await sb.auth.getSession();
  if (!res.data || !res.data.session) { window.location.href = 'login.html'; return; }
  currentUser = res.data.session.user;

  renderFAQ();
  loadDisputas();
  loadTransacciones();
});

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active', ['mis','abrir','faq'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(function(p){
    p.classList.remove('active');
  });
  document.getElementById('panel-' + tab).classList.add('active');
}

async function loadDisputas() {
  var list = document.getElementById('disputasList');

  // Intentar cargar desde tabla disputes si existe, sino mostrar empty
  var res = await sb.from('disputas')
    .select('id, transaccion_id, usuario_id, motivo, descripcion, estado, created_at')
    .eq('usuario_id', currentUser.id)
    .order('created_at', { ascending: false });

  if (res.error) {
    // Tabla no existe aún → empty state orientativo
    list.innerHTML =
      '<div class="empty">' +
        '<span class="empty-emoji">🛡️</span>' +
        '<div class="empty-title">Sin disputas activas</div>' +
        '<div class="empty-sub">No tenés disputas abiertas.<br>Si tuviste un problema con una compra,<br>usá la pestaña "Abrir disputa".</div>' +
      '</div>';
    return;
  }

  var data = res.data || [];

  if (data.length === 0) {
    list.innerHTML =
      '<div class="empty">' +
        '<span class="empty-emoji">🛡️</span>' +
        '<div class="empty-title">Sin disputas activas</div>' +
        '<div class="empty-sub">No tenés disputas abiertas.<br>Si tuviste un problema con una compra,<br>usá la pestaña "Abrir disputa".</div>' +
      '</div>';
    return;
  }

  list.innerHTML = data.map(function(d) {
    var fecha  = d.created_at ? new Date(d.created_at).toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'}) : '';
    var estado = d.estado || 'abierto';
    var ref    = '#DIS-' + String(d.id).slice(-4).toUpperCase();

    return '<div class="dispute-card">' +
      '<div class="d-header">' +
        '<div>' +
          '<div class="d-product">' + (d.motivo || 'Disputa') + '</div>' +
          '<div class="d-date">' + fecha + ' · <span style="color:var(--verde);font-weight:700">' + ref + '</span></div>' +
        '</div>' +
        '<span class="d-status ' + (ST_CLS[estado]||'st-cerrado') + '">' + (ST_LABEL[estado]||estado) + '</span>' +
      '</div>' +
      '<div class="d-desc">' + (d.descripcion || '') + '</div>' +
    '</div>';
  }).join('');
}

async function loadTransacciones() {
  // No se usa - el número de orden se ingresa manualmente
}
}

async function abrirDisputa() {
  var btn         = document.getElementById('btnSubmit');
  var numeroOrden = document.getElementById('fTx').value.trim();
  var motivo      = document.getElementById('fMotivo').value;
  var desc        = document.getElementById('fDesc').value.trim();

  if (!numeroOrden || isNaN(numeroOrden)) { showToast('⚠️ Ingresá el número de orden (solo números)'); return; }
  if (!motivo) { showToast('⚠️ Seleccioná el motivo'); return; }
  if (!desc)   { showToast('⚠️ Describí el problema'); return; }

  btn.disabled = true;
  btn.textContent = 'Buscando orden...';

  // Buscar la orden por numero_orden
  var txRes = await sb.from('ordenes').select('id,seller_id,comprador_email').eq('numero_orden', parseInt(numeroOrden)).single();
  if (txRes.error || !txRes.data) {
    showToast('❌ Orden #' + numeroOrden + ' no encontrada');
    btn.disabled = false; btn.textContent = 'Abrir disputa';
    return;
  }
  var txId     = txRes.data.id;
  var sellerId = txRes.data.seller_id || null;

  btn.textContent = 'Enviando...';

  var insert = {
    transaccion_id:  txId,
    usuario_id:      currentUser.id,
    motivo:          motivo,
    descripcion:     desc,
    estado:          'abierto',
    created_at:      new Date().toISOString(),
  };

  var res = await sb.from('disputas').insert(insert);

  if (res.error) {
    showToast('❌ ' + res.error.message);
  } else {
    showToast('✅ Disputa abierta — te contactamos en 24 hs');
    document.getElementById('fTx').value = '';
    document.getElementById('fMotivo').value = '';
    document.getElementById('fDesc').value = '';
    setTimeout(function(){
      setTab('mis');
      loadDisputas();
    }, 1500);
  }

  btn.disabled = false;
  btn.textContent = 'Abrir disputa';
}

function renderFAQ() {
  document.getElementById('faqList').innerHTML = FAQ_ITEMS.map(function(item, i) {
    return '<div class="faq-item" id="faq-' + i + '">' +
      '<div class="faq-q" onclick="toggleFAQ(' + i + ')">' +
        item.q + '<span class="arrow">▾</span>' +
      '</div>' +
      '<div class="faq-a">' + item.a + '</div>' +
    '</div>';
  }).join('');
}

function toggleFAQ(i) {
  document.getElementById('faq-' + i).classList.toggle('open');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2800);
}
</script>
</body>
</html>
